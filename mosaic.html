<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>AH!rchives — mosaic</title>
<style>
  :root { --fg:#eef1f7; --dim:#8b93a7; --acc:#7cc7ff; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; background:#05060a; overflow:hidden;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; color:var(--fg); }
  #stage { position:fixed; inset:0; display:block; }
  #panel { position:fixed; bottom:0; left:0; right:0; z-index:10;
    background:rgba(10,12,18,.78); backdrop-filter:blur(18px) saturate(1.3);
    border-top:1px solid rgba(255,255,255,.07);
    padding:6px 14px; user-select:none;
    transition:transform .3s ease, opacity .3s; display:flex; align-items:center; gap:10px; }
  #panel.hidden { transform:translateY(100%); opacity:0; }
  #panel h1 { font-size:9px; letter-spacing:.16em; margin:0; font-weight:700; white-space:nowrap; color:var(--acc); }
  #panel .sub { display:none; }
  .sliders { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
  .row { margin:0; display:flex; align-items:center; gap:5px; white-space:nowrap; }
  .row.mos { display:none; }
  .row label { display:flex; align-items:center; gap:4px; font-size:8px; color:var(--dim);
    letter-spacing:.03em; margin:0; text-transform:uppercase; white-space:nowrap; }
  .row label b { color:var(--fg); font-weight:600; min-width:22px; text-align:right; }
  input[type=range]{ -webkit-appearance:none; width:70px; height:2px; border-radius:2px;
    background:rgba(255,255,255,.18); outline:none; flex-shrink:1; min-width:40px; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:8px; height:8px; border-radius:50%;
    background:var(--acc); cursor:pointer; box-shadow:0 0 6px rgba(124,199,255,.6); }
  input[type=range]::-moz-range-thumb{ width:8px; height:8px; border:0; border-radius:50%;
    background:var(--acc); cursor:pointer; box-shadow:0 0 6px rgba(124,199,255,.6); }
  .btns { display:flex; gap:3px; margin:0; }
  button { flex:0 0 auto; font:inherit; font-size:8px; letter-spacing:.03em; color:var(--fg);
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.10); border-radius:4px;
    padding:3px 7px; cursor:pointer; transition:background .15s, border-color .15s; white-space:nowrap; }
  button:hover{ background:rgba(124,199,255,.16); border-color:rgba(124,199,255,.45); }
  button.on{ background:rgba(124,199,255,.22); border-color:rgba(124,199,255,.6); color:#dff0ff; }
  .sep{ width:1px; align-self:stretch; margin:2px 2px; background:rgba(255,255,255,.10); flex:0 0 auto; }
  .tiers button{ min-width:26px; font-weight:600; }
  .tiers button.on{ background:rgba(255,196,124,.24); border-color:rgba(255,196,124,.65); color:#ffe6c4;
    box-shadow:0 0 8px rgba(255,196,124,.25); }
  #hint { display:none; }
  #stat { position:fixed; top:8px; right:10px; z-index:10; text-align:right; font-size:8px;
    color:var(--dim); letter-spacing:.05em; line-height:1.4; opacity:.45; }
  #stat b{ color:var(--fg); }
  #loadbar { position:fixed; left:0; top:0; height:2px; background:linear-gradient(90deg,#7cc7ff,#b388ff);
    width:0%; z-index:20; transition:width .2s ease; box-shadow:0 0 10px rgba(124,199,255,.8); }
  #toggleBtn { position:fixed; bottom:6px; left:50%; transform:translateX(-50%); z-index:11; display:none; width:32px;height:18px;
    border-radius:9px 9px 0 0; background:rgba(10,12,18,.78); border:1px solid rgba(255,255,255,.10); border-bottom:0;
    color:var(--dim); cursor:pointer; font-size:10px; line-height:16px; text-align:center; }
  #focusName { position:fixed; left:50%; bottom:52px; transform:translateX(-50%); z-index:6;
    font-size:12px; letter-spacing:.12em; color:#dff0ff; opacity:0; transition:opacity .3s;
    text-shadow:0 0 18px rgba(124,199,255,.6); }
  #boot { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:8;
    color:var(--dim); font-size:12px; letter-spacing:.14em; pointer-events:none; transition:opacity .4s; }
  #backdrop{ position:fixed; inset:0; background:rgba(2,3,8,.5); z-index:30; opacity:0; pointer-events:none; transition:opacity .2s; }
  #backdrop.show{ opacity:1; pointer-events:auto; }
  #card{ position:fixed; z-index:31; width:360px; left:50%; top:50%; transform:translate(-50%,-46%) scale(.96);
    background:rgba(18,21,31,.94); backdrop-filter:blur(18px) saturate(1.2); border:1px solid rgba(255,255,255,.12);
    border-radius:19px; padding:19px; box-shadow:0 24px 70px rgba(0,0,0,.6); opacity:0; pointer-events:none;
    transition:opacity .2s, transform .2s; }
  #card.show{ opacity:1; pointer-events:auto; transform:translate(-50%,-50%) scale(1); }
  #cardImg{ width:100%; aspect-ratio:1; object-fit:cover; border-radius:13px; display:block; background:#0a0c14; }
  #cardName{ font-size:18px; font-weight:600; letter-spacing:.04em; margin:15px 2px 0; }
  #cardTraits{ display:flex; flex-wrap:wrap; gap:7px; margin:13px 0 0; }
  .chip{ font-size:12px; letter-spacing:.03em; color:#cfe0f5; background:rgba(124,199,255,.13);
    border:1px solid rgba(124,199,255,.28); border-radius:8px; padding:5px 10px; }
  .chip b{ color:#fff; font-weight:600; }
  #cardDesc{ font-size:12.5px; line-height:1.5; color:var(--dim); margin:13px 2px 0; max-height:89px; overflow:auto; }
  #cardBuy{ display:block; text-align:center; margin-top:17px; text-decoration:none; font-size:14px; font-weight:600;
    letter-spacing:.05em; color:#04122a; background:linear-gradient(90deg,#7cc7ff,#9ad0ff); padding:13px; border-radius:13px; }
  #cardBuy:hover{ filter:brightness(1.07); }
  #cardClose{ position:absolute; top:11px; right:11px; width:31px; height:31px; border-radius:9px; z-index:1;
    background:rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.15); color:#fff; font-size:18px; cursor:pointer; line-height:1; }
  #cardFav{ position:absolute; top:11px; right:48px; width:31px; height:31px; border-radius:9px; z-index:1;
    background:rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.15); color:#ffd36b; font-size:17px; cursor:pointer; line-height:1;
    transition:background .15s, transform .12s; }
  #cardFav:hover{ background:rgba(255,196,124,.22); }
  #cardFav.on{ background:rgba(255,196,124,.28); border-color:rgba(255,196,124,.7); transform:scale(1.08); }
</style>
</head>
<body>
<div id="loadbar"></div>
<canvas id="stage"></canvas>
<button id="toggleBtn" title="Show controls">⚙</button>
<div id="panel">
  <h1>AH!</h1>
  <div class="btns">
    <button id="mMos" class="on">▦ mosaic</button>
    <button id="mUni">✦ universe</button>
    <button id="mTime">✺ AH!</button>
  </div>
  <div class="sliders">
    <div class="row uni"><label>Heads <b id="vCount">—</b></label><input id="count" type="range" min="40" max="999" value="999"></div>
    <div class="row uni"><label>Sway <b id="vSwirl">0.00</b></label><input id="swirl" type="range" min="0" max="150" value="0"></div>
    <div class="row uni"><label>Depth <b id="vDepth">0.50</b></label><input id="depth" type="range" min="0" max="150" value="50"></div>
    <div class="row uni"><label>Speed <b id="vDrift">0.35</b></label><input id="drift" type="range" min="0" max="150" value="35"></div>
    <div class="row uni"><label>Size <b id="vSize">1.00</b></label><input id="size" type="range" min="40" max="200" value="100"></div>
    <div class="row mos"><label>Speed <b id="vMspeed">0.50</b></label><input id="mspeed" type="range" min="0" max="150" value="50"></div>
    <div class="row mos"><label>Active <b id="vActive">60</b></label><input id="active" type="range" min="0" max="100" value="60"></div>
    <div class="row mos"><label>Cell <b id="vCell">90</b></label><input id="cell" type="range" min="44" max="180" value="90"></div>
    <div class="row tim"><label>Flick <b id="vFlick">45</b></label><input id="flick" type="range" min="0" max="100" value="45"></div>
  </div>
  <div class="btns">
    <button id="bShape">◻</button>
    <button id="bPause" class="on">▶</button>
    <button id="bShuffle">⤮</button>
    <button id="bGlow" class="on">✦</button>
    <button id="bFlip">⤢</button>
  </div>
  <div class="sep"></div>
  <div class="btns tiers">
    <button id="tA" class="on">all</button>
    <button id="t1" title="900 items">T1</button>
    <button id="t2" title="77 items">T2</button>
    <button id="t3" title="22 items">T3</button>
    <button id="tFav" title="Favourites">★</button>
  </div>
</div>
<div id="stat"><div>loaded <b id="sLoaded">0</b>/<span id="sTotal">999</span></div><div><b id="sFps">0</b> fps</div></div>
<div id="focusName"></div>
<div id="backdrop"></div>
<div id="card">
  <button id="cardClose" title="Close">×</button>
  <button id="cardFav" title="Add to favourites">☆</button>
  <img id="cardImg" alt="">
  <div id="cardName"></div>
  <div id="cardTraits"></div>
  <div id="cardDesc"></div>
  <a id="cardBuy" target="_blank" rel="noopener">Buy on OpenSea ↗</a>
</div>
<div id="boot">loading 999 heads…</div>
<div id="hint">click a head to pull it forward · drag a slider · ⚙ hides panel</div>

<script src="thumbs/list.js" onerror="window.__noList=true"></script>
<script src="thumbs/meta.js" onerror="window.__noMeta=true"></script>
<script>
(() => {
  const cv = document.getElementById('stage');
  const gl = cv.getContext('webgl', { alpha:false, antialias:false, premultipliedAlpha:true, powerPreference:'high-performance', desynchronized:true });
  window.__diag = { gl: !!gl, ready:false, sprites:0, err:null };
  if(!gl){ document.getElementById('boot').textContent='WebGL unavailable in this browser'; return; }

  let W,H,DPR=Math.min(window.devicePixelRatio||1, 2);
  function resize(){ W=innerWidth||1280; H=innerHeight||800; cv.width=Math.floor(W*DPR); cv.height=Math.floor(H*DPR);
    cv.style.width=W+'px'; cv.style.height=H+'px'; gl.viewport(0,0,cv.width,cv.height); }
  addEventListener('resize', resize); resize();

  const IDS = (window.THUMB_IDS && window.THUMB_IDS.length) ? window.THUMB_IDS : Array.from({length:999},(_,i)=>i+1);
  document.getElementById('sTotal').textContent = IDS.length;

  // ---- params from UI ----
  const P = { count:IDS.length, swirl:0.30, depth:0.50, drift:0.35, size:1.0, shape:'square', paused:true, glow:true,
              mode:'mosaic', mspeed:0.50, cell:90, activePct:60, flip:'both', tiers:new Set(), favOnly:false, flickPct:45 };
  const bind = (id, key, f) => {
    const el=document.getElementById(id), out=document.getElementById('v'+id[0].toUpperCase()+id.slice(1));
    const upd=()=>{ const v=+el.value; P[key]= f? f(v): v; if(out) out.textContent=(typeof P[key]==='number'?(Number.isInteger(P[key])?P[key]:P[key].toFixed(2)):P[key]); };
    el.addEventListener('input',upd); upd();
  };
  bind('count','count', v=>Math.round(v));
  bind('swirl','swirl', v=>v/100);
  bind('depth','depth', v=>v/100);
  bind('drift','drift', v=>v/100);
  bind('size','size',  v=>v/100);
  bind('mspeed','mspeed', v=>v/100);
  bind('cell','cell', v=>Math.round(v));
  bind('active','activePct', v=>Math.round(v));
  bind('flick','flickPct', v=>Math.round(v));
  document.getElementById('vCount').textContent = P.count;

  // ---- shaders ----
  function sh(type,src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){ window.__diag.err='shader: '+gl.getShaderInfoLog(s); throw new Error(window.__diag.err);} return s; }
  const prog=gl.createProgram();
  gl.attachShader(prog, sh(gl.VERTEX_SHADER, `
    attribute vec2 a_pos; attribute vec2 a_uv; attribute float a_alpha;
    uniform vec2 u_res; varying vec2 v_uv; varying float v_alpha;
    void main(){ vec2 c=(a_pos/u_res)*2.0-1.0; gl_Position=vec4(c.x,-c.y,0.0,1.0); v_uv=a_uv; v_alpha=a_alpha; }`));
  gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, `
    precision mediump float; varying vec2 v_uv; varying float v_alpha; uniform sampler2D u_tex;
    void main(){ gl_FragColor = texture2D(u_tex, v_uv) * v_alpha; }`));
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog,gl.LINK_STATUS)){ window.__diag.err='link: '+gl.getProgramInfoLog(prog); document.getElementById('boot').textContent='shader link failed'; return; }
  gl.useProgram(prog);
  const aPos=gl.getAttribLocation(prog,'a_pos'), aUv=gl.getAttribLocation(prog,'a_uv'), aAlpha=gl.getAttribLocation(prog,'a_alpha');
  const uRes=gl.getUniformLocation(prog,'u_res'), uTex=gl.getUniformLocation(prog,'u_tex');
  gl.uniform1i(uTex,0);
  gl.enable(gl.BLEND);
  gl.clearColor(0.02,0.024,0.04,1);

  // ---- atlas geometry ----
  const TILE=256, COLS=32;            // 32*256 = 8192 ; holds up to 1024 heads
  const ROWS=Math.max(1, Math.ceil(IDS.length/COLS));
  const AW=COLS*TILE, AH=ROWS*TILE;
  const atlas=document.createElement('canvas'); atlas.width=AW; atlas.height=AH;
  const ax=atlas.getContext('2d');
  const atlasTex=gl.createTexture();
  // glow texture
  const glowC=document.createElement('canvas'); glowC.width=glowC.height=128;
  { const g=glowC.getContext('2d'); const rg=g.createRadialGradient(64,64,0,64,64,64);
    rg.addColorStop(0,'rgba(200,225,255,1)'); rg.addColorStop(0.45,'rgba(150,200,255,0.30)'); rg.addColorStop(1,'rgba(150,200,255,0)');
    g.fillStyle=rg; g.fillRect(0,0,128,128); }
  const glowTex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,glowTex); gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL,true);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,glowC);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);

  function maskPath(c, ox, oy, s, shape){
    c.beginPath();
    if(shape==='circle'){ c.arc(ox+s/2,oy+s/2,s/2-1,0,Math.PI*2); }
    else if(shape==='square'){ c.rect(ox,oy,s,s); }
    else { const r=s*0.16,e=s-1; c.moveTo(ox+r,oy+1); c.arcTo(ox+e,oy+1,ox+e,oy+e,r); c.arcTo(ox+e,oy+e,ox+1,oy+e,r); c.arcTo(ox+1,oy+e,ox+1,oy+1,r); c.arcTo(ox+1,oy+1,ox+e,oy+1,r); c.closePath(); }
  }
  function drawTile(img, k, shape){
    const col=k%COLS, row=(k/COLS)|0, ox=col*TILE, oy=row*TILE;
    ax.clearRect(ox,oy,TILE,TILE);
    const ar=(img.width||1)/(img.height||1); let dw=TILE,dh=TILE,dx=ox,dy=oy;
    if(ar>1){ dh=TILE; dw=TILE*ar; dx=ox-(dw-TILE)/2; } else { dw=TILE; dh=TILE/ar; dy=oy-(dh-TILE)/2; }
    ax.save(); maskPath(ax,ox,oy,TILE,shape); ax.clip(); ax.drawImage(img,dx,dy,dw,dh); ax.restore();
    if(shape!=='square'){ ax.save(); maskPath(ax,ox,oy,TILE,shape); ax.lineWidth=4; ax.strokeStyle='rgba(255,255,255,0.12)'; ax.stroke(); ax.restore(); }
  }
  function uploadAtlas(){
    gl.bindTexture(gl.TEXTURE_2D,atlasTex); gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL,true);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,atlas);
    gl.generateMipmap(gl.TEXTURE_2D);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR_MIPMAP_LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  }

  // ---- sprites (atlas tiles) ----
  const rnd=(a,b)=>a+Math.random()*(b-a);
  const sprites=[]; let order=[]; let loaded=0; let ready=false;
  // ---- tier filter ----
  const META = window.THUMB_META||{};
  function tierOf(id){ const m=META[id]; if(!m||!m.t) return null; const t=m.t.find(x=>x[0]==='Tier'); return t?t[1]:null; }
  // ---- favourites (persisted) ----
  let favs = new Set();
  try{ const raw=localStorage.getItem('ahFavs'); if(raw) favs=new Set(JSON.parse(raw)); }catch(e){}
  function saveFavs(){ try{ localStorage.setItem('ahFavs', JSON.stringify([...favs])); }catch(e){} }
  let pool=[];   // sprite indices passing the active filter (no filter = all)
  function rebuildPool(){
    if(P.favOnly){ pool = sprites.map((_,i)=>i).filter(i => favs.has(sprites[i].id)); return; }   // may be empty
    pool = sprites.map((_,i)=>i).filter(i => P.tiers.size===0 || P.tiers.has(tierOf(sprites[i].id)));
    if(!pool.length) pool = sprites.map((_,i)=>i);
  }
  // track which items are currently on screen so tiles never duplicate
  let shown = new Map();
  function setCellItem(c, it){
    if(c.item!=null && c.item!==undefined){ const n=(shown.get(c.item)||0)-1; if(n<=0) shown.delete(c.item); else shown.set(c.item,n); }
    c.item=it; shown.set(it,(shown.get(it)||0)+1);
  }
  function pickOffscreen(){            // a pool item not currently displayed, or null if all are shown
    if(shown.size>=pool.length) return null;
    for(let t=0;t<24;t++){ const it=pool[(Math.random()*pool.length)|0]; if(!shown.get(it)) return it; }
    for(const it of pool){ if(!shown.get(it)) return it; }
    return null;
  }
  const INS=0.5/AW; // half-texel inset
  // average-luminance probe — used by time mode to pick the darkest ("black") items
  const lumCv=document.createElement('canvas'); lumCv.width=lumCv.height=4;
  const lumCtx=lumCv.getContext('2d',{willReadFrequently:true});
  function avgLum(img){ try{ lumCtx.clearRect(0,0,4,4); lumCtx.drawImage(img,0,0,4,4);
    const d=lumCtx.getImageData(0,0,4,4).data; let s=0; for(let i=0;i<d.length;i+=4) s+=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    return s/(d.length/4)/255; }catch(e){ return 0.5; } }
  let darkOrder=[];   // sprite indices sorted darkest→lightest (built after load)
  function darkItem(){ const n=darkOrder.length; if(!n) return 0; const span=Math.min(70,n); return darkOrder[(Math.random()*span)|0]; }             // a truly-black item for the digits
  function brightItem(){ const n=darkOrder.length; if(!n) return 0; const span=Math.min(300,n); return darkOrder[n-1-((Math.random()*span)|0)]; }   // a light item for the field
  function addSprite(id,img){
    const k=sprites.length, col=k%COLS, row=(k/COLS)|0;
    const u0=col*TILE/AW+INS, v0=row*TILE/AH+INS, u1=(col+1)*TILE/AW-INS, v1=(row+1)*TILE/AH-INS;
    sprites.push({ id,img, u0,v0,u1,v1, lum:avgLum(img),
      base:rnd(0.55,1.35), r:Math.sqrt(Math.random()), a:rnd(0,Math.PI*2), dir:Math.random()<0.5?-1:1,
      zPh:rnd(0,Math.PI*2), zSp:rnd(0.25,0.55), spin:rnd(-0.25,0.25), spSp:rnd(-0.4,0.4),
      sx:rnd(0,1), sy:rnd(0,1), focus:0, _bx:0,_by:0,_bs:0,_z:0,_fk:0 });
    order.push(k); loaded++;
  }
  const loadbar=document.getElementById('loadbar'), sLoaded=document.getElementById('sLoaded'), boot=document.getElementById('boot');
  let li=0, settled=0, finished=false;
  function onSettled(){ settled++; sLoaded.textContent=loaded; loadbar.style.width=(100*settled/IDS.length)+'%';
    if(settled>=IDS.length) finish(); else pump(); }
  function pump(){
    while(li<IDS.length && (li-settled)<32){
      const id=IDS[li++]; const im=new Image();
      im.onload=()=>{ addSprite(id,im); onSettled(); };
      im.onerror=onSettled;
      im.src=(window.THUMB_DATA&&window.THUMB_DATA[id])?window.THUMB_DATA[id]:'thumbs/'+id+'.jpg';
    }
  }
  function finish(){
    if(finished) return; finished=true;
    boot.textContent='building atlas…';
    setTimeout(()=>{
      for(let k=0;k<sprites.length;k++) drawTile(sprites[k].img,k,P.shape);
      uploadAtlas();
      ready=true; window.__diag.ready=true; window.__diag.sprites=sprites.length;
      boot.style.opacity=0; loadbar.style.opacity=0;
      document.getElementById('count').max=sprites.length;
      darkOrder=sprites.map((_,i)=>i).sort((a,b)=>sprites[a].lum-sprites[b].lum);
      rebuildPool();
      if(P.mode==='mosaic') buildGrid();
    },30);
  }
  function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } }
  pump();

  // ---- buffers ----
  const MAX=4096;
  const mainArr=new Float32Array(MAX*6*5), glowArr=new Float32Array(MAX*6*5);
  const vbo=gl.createBuffer();
  function setAttribs(){ gl.bindBuffer(gl.ARRAY_BUFFER,vbo);
    gl.enableVertexAttribArray(aPos); gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,20,0);
    gl.enableVertexAttribArray(aUv);  gl.vertexAttribPointer(aUv,2,gl.FLOAT,false,20,8);

  function quad(arr,o, cx,cy,hs,co,si, u0,v0,u1,v1, al){
    const x0=-hs,y0=-hs,x1=hs,y1=hs;
    const TLx=cx+x0*co-y0*si, TLy=cy+x0*si+y0*co;
    const TRx=cx+x1*co-y0*si, TRy=cy+x1*si+y0*co;
    const BLx=cx+x0*co-y1*si, BLy=cy+x0*si+y1*co;
    const BRx=cx+x1*co-y1*si, BRy=cy+x1*si+y1*co;
    let i=o;
    arr[i++]=TLx;arr[i++]=TLy;arr[i++]=u0;arr[i++]=v0;arr[i++]=al;
    arr[i++]=TRx;arr[i++]=TRy;arr[i++]=u1;arr[i++]=v0;arr[i++]=al;
    arr[i++]=BLx;arr[i++]=BLy;arr[i++]=u0;arr[i++]=v1;arr[i++]=al;
    arr[i++]=BLx;arr[i++]=BLy;arr[i++]=u0;arr[i++]=v1;arr[i++]=al;
    arr[i++]=TRx;arr[i++]=TRy;arr[i++]=u1;arr[i++]=v0;arr[i++]=al;
    arr[i++]=BRx;arr[i++]=BRy;arr[i++]=u1;arr[i++]=v1;arr[i++]=al;
    return i;
  }
  function quadWH(arr,o, cx,cy,hw,hh, u0,v0,u1,v1, al){
    const x0=cx-hw,x1=cx+hw,y0=cy-hh,y1=cy+hh; let i=o;
    arr[i++]=x0;arr[i++]=y0;arr[i++]=u0;arr[i++]=v0;arr[i++]=al;
    arr[i++]=x1;arr[i++]=y0;arr[i++]=u1;arr[i++]=v0;arr[i++]=al;
    arr[i++]=x0;arr[i++]=y1;arr[i++]=u0;arr[i++]=v1;arr[i++]=al;
    arr[i++]=x0;arr[i++]=y1;arr[i++]=u0;arr[i++]=v1;arr[i++]=al;
    arr[i++]=x1;arr[i++]=y0;arr[i++]=u1;arr[i++]=v0;arr[i++]=al;
    arr[i++]=x1;arr[i++]=y1;arr[i++]=u1;arr[i++]=v1;arr[i++]=al;
    return i;
  }

  // ---- mosaic grid state ----
  let cells=[], gCols=0, gRows=0, gCell=0, gCellW=0, gCellH=0, gW=0, gH=0, gCellParam=0;
  const MOSAIC_BAR=40;   // px reserved at the bottom for the soundbar so no tile hides behind it
  function rndInterval(){ const avg=6/(0.25+P.mspeed*3); return avg*(0.4+Math.random()*1.4); }
  function buildGrid(){
    gW=W; gH=H;
    const AH=Math.max(1,H-MOSAIC_BAR);                 // drawable height above the soundbar
    const filtered = (P.tiers.size>0 || P.favOnly) && pool.length>0;
    let total, usedRows;
    if(filtered){
      // auto-size so every pooled item shows exactly once and fills the screen.
      // search columns near the square-ish guess; favor few empty cells + near-square tiles.
      const N=pool.length, ratio=W/AH, guess=Math.sqrt(N*ratio);
      let best=null;
      for(let cols=Math.max(1,Math.floor(guess)-2); cols<=Math.min(N,Math.ceil(guess)+2); cols++){
        const rows=Math.ceil(N/cols), waste=cols*rows-N;
        const adev=Math.abs(Math.log((W/cols)/(AH/rows)));   // 0 = perfectly square tiles
        const score=waste + adev*4;
        if(!best || score<best.score){ best={cols,rows,score}; }
      }
      gCols=best.cols; gRows=best.rows; total=N;        // one cell per unique item
    } else {
      gCols=Math.max(1,Math.round(W/P.cell));
      gRows=Math.max(1,Math.round(AH/P.cell));
      total=Math.min(gCols*gRows, MAX);
    }
    usedRows=Math.ceil(total/gCols);
    gCellParam=P.cell;                                 // remember slider value used (for rebuild detection)
    // SQUARE tiles — never stretched. Pick the largest square that fits, then center the block.
    const cell=Math.min(W/gCols, AH/usedRows);
    gCell=cell; gCellW=cell; gCellH=cell;
    const x0=(W - gCols*cell)/2, y0=(AH - usedRows*cell)/2;   // center horizontally + vertically
    const fullRows=Math.floor(total/gCols), lastCount=total-fullRows*gCols;
    const bag=pool.slice(); shuffle(bag); let bi=0;
    shown=new Map(); cells=[];
    for(let i=0;i<total;i++){
      const row=(i/gCols)|0, col=i%gCols;
      const centered = (row===fullRows && lastCount>0);            // center a partial last row
      const xoff = centered ? (gCols-lastCount)*0.5*cell : 0;
      if(bi>=bag.length){ shuffle(bag); bi=0; }                    // only repeats if cells > pool (manual mode)
      const c={ cx:x0+(col+0.5)*cell+xoff, cy:y0+(row+0.5)*cell, r:Math.random(),
        item:undefined, flip:0, flipping:false, swapped:false, axis:Math.random()<0.5?0:1, next:T+rndInterval()*Math.random() };
      setCellItem(c, bag[bi++]); cells.push(c);
    }
  }

  // ---- time mode: the grid flicks NFTs to spell the real clock ----
  const FONT5={
    '0':["111","101","101","101","111"], '1':["010","010","010","010","010"],
    '2':["111","001","111","100","111"], '3':["111","001","111","001","111"],
    '4':["101","101","111","001","001"], '5':["111","100","111","001","111"],
    '6':["111","100","111","101","111"], '7':["111","001","010","010","010"],
    '8':["111","101","111","101","111"], '9':["111","101","111","001","111"],
    ':':["0","1","0","1","0"],
    'A':["111","101","111","101","101"], 'H':["101","101","111","101","101"],
    '!':["1","1","1","0","1"] };
  const glyphW = ch => (ch===':'||ch==='!')?1:3;
  function timeLayoutWidth(str){ let w=0; for(const ch of str) w+=glyphW(ch)+1; return w-1; }
  function timeString(){ return 'AH!'; }   // the time-mode grid now spells AH! (static)
  let tColStart=0, tRowStart=0, fontCols=0, litSet=new Set(), lastTimeStr='', timeDirty=true;
  function buildLit(str){
    const lit=new Set(); let x=tColStart;
    for(const ch of str){ const g=FONT5[ch]||FONT5['0'], w=glyphW(ch);
      for(let r=0;r<5;r++){ const def=g[r]; for(let px=0;px<w;px++){ if(def[px]==='1'){
        const gr=tRowStart+r, gc=x+px; if(gr>=0&&gr<gRows&&gc>=0&&gc<gCols) lit.add(gr*gCols+gc); } } }
      x+=w+1; }

  }
  function buildTimeGrid(){
    gW=W; gH=H; const AH=Math.max(1,H-MOSAIC_BAR);
    fontCols=timeLayoutWidth('AH!');
    const t=Math.min(W*0.80/fontCols, AH*0.46/5);           // tile size so the clock is large + centered
    gCols=Math.max(fontCols+2, Math.round(W/t));
    gRows=Math.max(7, Math.round(AH/t));
    const cell=Math.min(W/gCols, AH/gRows);                 // square tiles, never stretched
    gCell=cell; gCellW=cell; gCellH=cell;
    const x0=(W-gCols*cell)/2, y0=(AH-gRows*cell)/2;
    tColStart=Math.floor((gCols-fontCols)/2); tRowStart=Math.floor((gRows-5)/2);
    lastTimeStr=timeString(); litSet=buildLit(lastTimeStr);
    shown=new Map(); cells=[];
    for(let i=0;i<gCols*gRows;i++){ const row=(i/gCols)|0, col=i%gCols;
      const c={ cx:x0+(col+0.5)*cell, cy:y0+(row+0.5)*cell, r:Math.random(),
        item:undefined, flip:0, flipping:false, swapped:false, axis:0, next:T+Math.random()*2.5 };
      setCellItem(c, litSet.has(i)?darkItem():brightItem());   // digits = black items, field = light items
      cells.push(c);
    }
  }

  // begin a dissolve: the cell's current image fades out to reveal a different one behind it
  function startFade(c){
    c.prevItem=c.item;
    const it=pickOffscreen();
    if(it!=null){ setCellItem(c,it); }
    else { const d=cells[(Math.random()*cells.length)|0]; if(d&&d!==c){ const tmp=c.item; c.item=d.item; d.item=tmp; } }
    c.flipping=true; c.flip=0;
  }

  // ---- interaction ----
  const focusName=document.getElementById('focusName'); let focusTimer=0;
  cv.addEventListener('pointerdown', e=>{
    const mx=e.clientX,my=e.clientY;
    if(P.mode==='mosaic' || P.mode==='time'){    // click a tile → open its card

      for(const c of cells){ if(mx>=c.cx-hw&&mx<=c.cx+hw&&my>=c.cy-hh&&my<=c.cy+hh){

  });

  // ---- info / buy card ----
  const CONTRACT='0xa179a765c52ced91647c082f02d7e737d7781cae';
  const card=document.getElementById('card'), backdrop=document.getElementById('backdrop'),
        cardImg=document.getElementById('cardImg'), cardName=document.getElementById('cardName'),
        cardTraits=document.getElementById('cardTraits'), cardDesc=document.getElementById('cardDesc'),
        cardBuy=document.getElementById('cardBuy'), cardFav=document.getElementById('cardFav');
  function thumbSrc(id){ return (window.THUMB_DATA&&window.THUMB_DATA[id])?window.THUMB_DATA[id]:'thumbs/'+id+'.jpg'; }
  let cardId=null;
  function syncFavBtn(){ const on=cardId!=null&&favs.has(cardId);
    cardFav.classList.toggle('on',on); cardFav.textContent=on?'★':'☆';
    cardFav.title=on?'Remove from favourites':'Add to favourites'; }
  function showCard(id){
    cardId=id;
    const m=(window.THUMB_META&&window.THUMB_META[id])||null;
    cardImg.src=thumbSrc(id);
    cardName.textContent=(m&&m.n)||('AH!rchives #'+id);

    if(m&&m.t&&m.t.length){ for(const tr of m.t){ const c=document.createElement('span'); c.className='chip'; c.innerHTML=tr[0]+' · <b>'+tr[1]+'</b>'; cardTraits.appendChild(c); } }
    else { const c=document.createElement('span'); c.className='chip'; c.textContent='#'+id; cardTraits.appendChild(c); }

  }
  cardFav.onclick=()=>{ if(cardId==null) return;

    if(typeof refreshFavBtn==='function') refreshFavBtn();

  };
  function hideCard(){ card.classList.remove('show'); backdrop.classList.remove('show'); }
  document.getElementById('cardClose').onclick=hideCard;
  backdrop.onclick=hideCard;
  addEventListener('keydown', e=>{ if(e.key==='Escape') hideCard(); });

  // ---- buttons / modes ----
  const bShape=document.getElementById('bShape'), bPause=document.getElementById('bPause'),
        bShuffle=document.getElementById('bShuffle'), bGlow=document.getElementById('bGlow'),
        bFlip=document.getElementById('bFlip'),
        mUni=document.getElementById('mUni'), mMos=document.getElementById('mMos'),
        hint=document.getElementById('hint');
  const flipLabel={h:'⇆', v:'⇅', both:'⤢', null:'⊘'};
  const flipOrder=['both','h','v','null'];
  function setFlip(m){ P.flip=m; bFlip.textContent=flipLabel[m]; }
  bFlip.onclick=()=>{ setFlip(flipOrder[(flipOrder.indexOf(P.flip)+1)%flipOrder.length]); };
  const shapeLabel={round:'◻',circle:'●',square:'▦'};
  function rebuildAtlas(){ if(!ready) return; for(let k=0;k<sprites.length;k++) drawTile(sprites[k].img,k,P.shape); uploadAtlas(); }
  function setShape(sh){ P.shape=sh; bShape.textContent=shapeLabel[sh]; rebuildAtlas(); }
  bShape.onclick=()=>{ setShape(P.shape==='round'?'circle':P.shape==='circle'?'square':'round'); };
  bPause.onclick=()=>{ P.paused=!P.paused; bPause.classList.toggle('on',P.paused); bPause.textContent=P.paused?'▶':'⏸'; };
  bShuffle.onclick=()=>{
    if(P.mode==='mosaic'){ for(const c of cells) startFade(c); }
    else if(P.mode==='time'){ for(const c of cells){ c.flipping=true; c.flip=0; c.swapped=false; } }
    else { for(const s of sprites){ s.r=Math.sqrt(Math.random()); s.a=rnd(0,Math.PI*2); s.zPh=rnd(0,Math.PI*2); s.base=rnd(0.55,1.35);} shuffle(order); }
  };
  bGlow.onclick=()=>{ P.glow=!P.glow; bGlow.classList.toggle('on',P.glow); };
  const mTime=document.getElementById('mTime');
  function applyMode(){
    const uni=P.mode==='universe', tim=P.mode==='time';
    document.querySelectorAll('.row.uni').forEach(e=>e.style.display=uni?'flex':'none');
    document.querySelectorAll('.row.mos').forEach(e=>e.style.display=(P.mode==='mosaic')?'flex':'none');
    document.querySelectorAll('.row.tim').forEach(e=>e.style.display=tim?'flex':'none');
    mUni.classList.toggle('on',uni); mMos.classList.toggle('on',P.mode==='mosaic'); mTime.classList.toggle('on',tim);
    bGlow.style.display=uni?'':'none'; bFlip.style.display='none'; bShuffle.textContent='⤮';
    hint.textContent='';
  }
  function setMode(m){
    if(P.mode===m) return; P.mode=m;
    if(m==='universe'){ if(P.shape==='square') setShape('round'); }
    else { if(P.shape!=='square') setShape('square'); }
    if(m==='mosaic') buildGrid();
    if(m==='time'){ timeDirty=true; if(P.paused){ P.paused=false; bPause.classList.remove('on'); bPause.textContent='⏸'; } }
    applyMode();
  }
  mUni.onclick=()=>setMode('universe');
  mMos.onclick=()=>setMode('mosaic');
  mTime.onclick=()=>setMode('time');
  applyMode();

  // ---- tier + favourites filter buttons ----
  const tA=document.getElementById('tA'), tFav=document.getElementById('tFav'),
        tierBtns={'1':document.getElementById('t1'),'2':document.getElementById('t2'),'3':document.getElementById('t3')};
  function refreshFavBtn(){ tFav.classList.toggle('on',P.favOnly);
    tFav.textContent = '★ '+favs.size; }
  function syncTierBtns(){ tA.classList.toggle('on',P.tiers.size===0 && !P.favOnly);
    for(const k in tierBtns) tierBtns[k].classList.toggle('on',!P.favOnly && P.tiers.has(k));
    refreshFavBtn(); }
  function applyFilter(){
    rebuildPool();
    order = pool.slice(); shuffle(order);
    if(P.mode==='mosaic'){
      buildGrid();                                   // resize + assign each item once
      if(!P.paused){ for(const c of cells){ c.prevItem=null; c.flipping=true; c.flip=0; } }   // fade the new set in
    } else if(P.mode==='time'){ timeDirty=true; }
    // empty favourites → show a friendly hint over the dark canvas
    if(P.favOnly && pool.length===0){ boot.textContent='no favourites yet — open any item and tap ☆'; boot.style.opacity=1; }
    else { boot.style.opacity=0; }
    syncTierBtns();
  }
  tA.onclick=()=>{ if(P.tiers.size===0 && !P.favOnly) return; P.tiers.clear(); P.favOnly=false; applyFilter(); };
  for(const k in tierBtns){ tierBtns[k].onclick=()=>{ P.favOnly=false; P.tiers.has(k)?P.tiers.delete(k):P.tiers.add(k); applyFilter(); }; }
  tFav.onclick=()=>{ P.favOnly=!P.favOnly; if(P.favOnly) P.tiers.clear(); applyFilter(); };
  refreshFavBtn();

  const panel=document.getElementById('panel'), toggleBtn=document.getElementById('toggleBtn');
  document.querySelector('#panel h1').addEventListener('dblclick',hidePanel);
  toggleBtn.onclick=showPanel;
  function hidePanel(){ panel.classList.add('hidden'); toggleBtn.style.display='block'; }
  function showPanel(){ panel.classList.remove('hidden'); toggleBtn.style.display='none'; }
  addEventListener('keydown',e=>{ if(e.key==='h') panel.classList.contains('hidden')?showPanel():hidePanel();
    if(e.key===' '){ e.preventDefault(); bPause.click(); } });

  // ---- animation ----
  let T=0,last=performance.now(),fa=0,ft=0; const sFps=document.getElementById('sFps');
  function frame(now){
    let dt=(now-last)/1000; last=now; if(dt>0.05) dt=0.05;
    if(!P.paused) T+=dt;
    gl.clear(gl.COLOR_BUFFER_BIT);
    if(ready){
      gl.uniform2f(uRes,W,H); gl.activeTexture(gl.TEXTURE0);

      if(P.mode==='mosaic'){
        if(gW!==W || gH!==H || (!P.favOnly && P.tiers.size===0 && gCellParam!==P.cell)) buildGrid();
        const fadeDur=0.75;
        let mo=0;
        const frac=P.activePct/100;
        for(const c of cells){
          if(!P.paused){
            if(!c.flipping && T>=c.next){
              if(c.r<frac){ startFade(c); }
              else { c.next=T+rndInterval(); }
            }
            if(c.flipping){ c.flip += dt/fadeDur;
              if(c.flip>=1){ c.flipping=false; c.flip=0; c.prevItem=null; c.next=T+rndInterval(); } }
          }
          const hw=gCellW*0.5, hh=gCellH*0.5;
          if(c.flipping){
            const p=c.flip<0?0:c.flip>1?1:c.flip, e=p*p*(3-2*p);          // smoothstep dissolve
            if(c.prevItem!=null){                                        // reveal the image behind, fade the front out
              const sn=sprites[c.item], sp=sprites[c.prevItem];
              if(sn) mo=quadWH(mainArr,mo, c.cx,c.cy, hw,hh, sn.u0,sn.v0,sn.u1,sn.v1, 1);
              if(sp) mo=quadWH(mainArr,mo, c.cx,c.cy, hw,hh, sp.u0,sp.v0,sp.u1,sp.v1, 1-e);
            } else { const s=sprites[c.item]; if(s) mo=quadWH(mainArr,mo, c.cx,c.cy, hw,hh, s.u0,s.v0,s.u1,s.v1, e); }
          } else { const s=sprites[c.item]; if(s) mo=quadWH(mainArr,mo, c.cx,c.cy, hw,hh, s.u0,s.v0,s.u1,s.v1, 1); }
          if(mo>=mainArr.length-30) break;
        }
        gl.bindTexture(gl.TEXTURE_2D,atlasTex); gl.blendFunc(gl.ONE,gl.ONE_MINUS_SRC_ALPHA);
        gl.bindBuffer(gl.ARRAY_BUFFER,vbo); gl.bufferData(gl.ARRAY_BUFFER,mainArr.subarray(0,mo),gl.DYNAMIC_DRAW); setAttribs();
        gl.drawArrays(gl.TRIANGLES,0,mo/5);

      } else if(P.mode==='time'){
        if(gW!==W || gH!==H || timeDirty){ buildTimeGrid(); timeDirty=false; }
        const ts=timeString();
        if(ts!==lastTimeStr){                                  // a digit changed → flick the cells that flipped state
          const nl=buildLit(ts);
          for(let i=0;i<cells.length;i++){ if(litSet.has(i)!==nl.has(i)){ const c=cells[i]; c.flipping=true; c.flip=0; c.swapped=false; } }
          litSet=nl; lastTimeStr=ts;
        }
        const flipDur=0.32, flickFrac=P.flickPct/100; let mo=0;
        for(let i=0;i<cells.length;i++){ const c=cells[i];
          const lit=litSet.has(i);
          if(!P.paused && lit){                               // ONLY the AH! letters move; the field stays static
            if(!c.flipping && T>=c.next){
              if(Math.random()<flickFrac){ c.flipping=true; c.flip=0; c.swapped=false; }
              c.next=T+0.6+Math.random()*2.6;
            }
            if(c.flipping){ c.flip += dt/flipDur;
              if(c.flip>=0.5 && !c.swapped){ setCellItem(c, darkItem()); c.swapped=true; }   // swap to another black item
              if(c.flip>=1){ c.flipping=false; c.flip=0; } }
          }
          const s=sprites[c.item]; if(!s) continue;
          let f=1; if(c.flipping) f=Math.abs(Math.cos(c.flip*Math.PI));
          const al = lit ? 1.0*(0.5+0.5*f) : 0.92;            // letters pulse as they flick; field is steady
          mo=quadWH(mainArr,mo, c.cx,c.cy, gCellW*0.5, gCellH*0.5, s.u0,s.v0,s.u1,s.v1, al);
          if(mo>=mainArr.length-30) break;
        }
        gl.bindTexture(gl.TEXTURE_2D,atlasTex); gl.blendFunc(gl.ONE,gl.ONE_MINUS_SRC_ALPHA);
        gl.bindBuffer(gl.ARRAY_BUFFER,vbo); gl.bufferData(gl.ARRAY_BUFFER,mainArr.subarray(0,mo),gl.DYNAMIC_DRAW); setAttribs();
        gl.drawArrays(gl.TRIANGLES,0,mo/5);

      } else {
        const unit=Math.min(W,H)*0.20*P.size;
        const spanX=W+unit*2;                  // horizontal wrap span
        const hbase=P.drift*W*0.13;            // horizontal scroll speed (px/s)
        const sway=P.swirl*unit*0.5;           // optional gentle vertical sway
        const N=Math.min(P.count,order.length);
        document.getElementById('vCount').textContent=N;
        const active=order.slice(0,N);
        for(const idx of active){ const s=sprites[idx];
          let z=0.5+0.5*Math.sin(s.zPh + T*s.zSp*(0.6+P.depth*1.6));
          if(s.focus){ const k=Math.max(0,1-(now-s.focus)/3400); z=z*(1-k)+(0.95+0.05*Math.sin(now/200))*k; s._fk=k; } else s._fk=0;
          s._z=z;
          const pf=0.45+0.7*s.base;             // parallax: larger heads scroll faster
          let x=s.sx*spanX - T*hbase*pf;        // continuous leftward drift
          x=((x%spanX)+spanX)%spanX - unit;     // wrap horizontally
          const y=unit*0.5 + s.sy*(H-unit) + Math.sin(T*s.spSp*0.8 + s.zPh)*sway;
          s._bx=x; s._by=y; s._bs=(0.12+0.92*z)*s.base*unit*(1+0.35*s._fk);
        }
        active.sort((i,j)=>sprites[i]._z-sprites[j]._z);

        let mo=0, glo=0;
        for(const idx of active){ const s=sprites[idx]; const size=s._bs; if(size<2) continue;
          const al=Math.min(1,0.07+0.95*s._z+0.4*s._fk);
          const hs=size/2;   // axis-aligned upright squares (no rotation)
          mo=quad(mainArr,mo, s._bx,s._by,hs,1,0, s.u0,s.v0,s.u1,s.v1, al);
          if(P.glow && (s._z>0.78||s._fk>0)){ const gi=Math.min(1,(s._z-0.78)*3.2+s._fk); const ghs=size*0.85;
            glo=quad(glowArr,glo, s._bx,s._by,ghs,1,0, 0,0,1,1, al*0.6*gi); }
        }
        gl.bindTexture(gl.TEXTURE_2D,atlasTex);
        gl.blendFunc(gl.ONE,gl.ONE_MINUS_SRC_ALPHA);
        gl.bindBuffer(gl.ARRAY_BUFFER,vbo); gl.bufferData(gl.ARRAY_BUFFER,mainArr.subarray(0,mo),gl.DYNAMIC_DRAW); setAttribs();
        gl.drawArrays(gl.TRIANGLES,0,mo/5);
        if(P.glow && glo>0){ gl.bindTexture(gl.TEXTURE_2D,glowTex); gl.blendFunc(gl.ONE,gl.ONE);
          gl.bufferData(gl.ARRAY_BUFFER,glowArr.subarray(0,glo),gl.DYNAMIC_DRAW); setAttribs();
          gl.drawArrays(gl.TRIANGLES,0,glo/5); }
      }
    }
    fa++; ft+=dt; if(ft>=0.5){ sFps.textContent=Math.round(fa/ft); fa=0; ft=0; }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
