<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>ALTER HERO — AH!rchives</title>
<style>
  /* ============================================================================
     HOME — white page. The hero collage floats in depth-map pseudo-3D; three
     draggable worlds (archives · book · music) hover over it and dive open.
     Assets expected: assets/hero.png (collage) + assets/logo.png (graffiti mark).
     Falls back to a placeholder image until those files are dropped in.
     ============================================================================ */
  :root{ --ink:#111; --paper:#fff; --mono:ui-monospace,"SF Mono",Menlo,monospace; }
  *{ box-sizing:border-box; margin:0; }
  html,body{ height:100%; }
  body{ font-family:var(--mono); color:var(--ink); background:var(--paper); overflow:hidden;
    -webkit-font-smoothing:antialiased; touch-action:none; }

  /* ---- the stage: hero collage removed — the three icons now hold the centre ---- */
  #stage{ display:none; }
  #heroWrap{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:340px; height:340px; perspective:1100px; transition:opacity .8s ease; }
  #hero{ width:100%; height:100%; display:block; transform-style:preserve-3d;
    filter:drop-shadow(0 26px 40px rgba(20,16,24,.12)); }

  /* ---- logo + motto pinned to the TOP ---- */
  #top{ position:fixed; left:0; right:0; top:13.4vh; z-index:5; display:flex; flex-direction:column; align-items:center; pointer-events:none; }   /* 10% lower (was 3.4vh) */
  #logo{ width:min(16.1vh,34.5vw,184px); opacity:0; transition:opacity 1s ease .3s; user-select:none; -webkit-user-drag:none; }   /* 10% bigger */
  #logo.in{ opacity:1; }
  #motto{ margin-top:10px; font-size:11px; letter-spacing:.3em; text-transform:uppercase; color:#8a8290;
    opacity:0; transition:opacity 1s ease .5s; }
  #motto.in{ opacity:.9; }
  #logoFallback{ font-weight:900; font-size:clamp(22px,4.84vw,37px); letter-spacing:-.02em; line-height:.86;
    text-align:center; text-transform:uppercase; -webkit-text-stroke:1px #111; color:#fff;
    text-shadow:2px 2px 0 #111; opacity:0; transition:opacity 1s ease .3s; }
  #logoFallback.in{ opacity:1; }
  /* ---- "all frequencies reserved" line pinned to the BOTTOM ---- */
  #foot{ position:fixed; left:0; right:0; bottom:2.2vh; z-index:5; display:flex; flex-direction:column; align-items:center; gap:5px; justify-content:center; pointer-events:none; }
  #tag{ font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:#8a8290;
    opacity:0; transition:opacity 1s ease .5s; }
  #tag.in{ opacity:.85; }
  #studioLink{ font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:#8a8290;
    text-decoration:none; cursor:pointer; pointer-events:auto;               /* clickable even though #foot is pointer-events:none */
    opacity:0; transition:opacity 1s ease .5s, color .15s ease, font-weight .15s ease; }
  #studioLink.in{ opacity:.85; }
  #studioLink:hover{ font-weight:700; color:#4a4652; }                        /* hover → bold + darker */

  /* ---- world icons: animated pixel-art characters; the comic bubble appears only ON HOVER ---- */
  .orb{ position:fixed; z-index:6; left:0; top:0; width:128px; display:flex; justify-content:center;
    cursor:pointer; touch-action:manipulation; user-select:none;
    --rs:1;                                                        /* --rs = responsive shrink; per-icon --h / --headFrac set below */
    transition:opacity .28s ease; }
  /* per-character SCALE of the native pixel art (integer = crispest). Native frame sizes:
     GIANT/WalkBoy 32×64, LittleMF 32×32. On-screen size = native × --scale (× --rs on mobile).
     --headPx = head height above feet in NATIVE px, so the hover bubble sits just above the head. */
  #oArchives{ --scale:3; --headPx:54; }   /* GIANT    32×64 ×3 = 96×192 px */
  #oBook{     --scale:3; --headPx:29; }   /* WalkBoy  32×64 ×3 = 96×192 px */
  #oMusic{    --scale:2; --headPx:58; }   /* LittleMF 32×32 ×2 = 64×64 px */
  .orb .chip{ position:relative; width:128px; height:128px; display:flex; align-items:flex-end; justify-content:center;
    transform-origin:bottom center; transition:transform .18s cubic-bezier(.2,.7,.2,1), filter .18s; }
  /* ---- reflecting lake: a mirrored, softly-swaying, fading copy that hangs DOWN from the soil ---- */
  .lake{ position:absolute; left:50%; bottom:0; width:64px; height:128px; margin-left:-32px; pointer-events:none;
    display:flex; justify-content:center; align-items:flex-end; overflow:visible; transform-origin:bottom center;
    animation:lake-sway 6.6s ease-in-out infinite; }
  /* the three reflections drift out of phase so they never pause in unison */
  #oArchives .lake{ animation-delay:-1.3s; }
  #oMusic    .lake{ animation-delay:-3.7s; }
  .lake .sprite{ transform-origin:bottom center; transform:scale(calc(var(--rs,1)*var(--scale,1))) scaleY(-1);
    opacity:.30;                                                     /* mirror hangs below the soil; fades toward its far (head) end */
    -webkit-mask-image:linear-gradient(to top, #000 18%, transparent 82%);
    mask-image:linear-gradient(to top, #000 18%, transparent 82%); }
  /* sway a couple of times, then hold still (settled water) before resuming — an occasional pause */
  @keyframes lake-sway{
    0%{ transform:skewX(-2deg); }   14%{ transform:skewX(2deg); }   28%{ transform:skewX(-1.6deg); }
    38%{ transform:skewX(0deg); }   56%{ transform:skewX(0deg); }   /* ← still-water pause */
    70%{ transform:skewX(2deg); }   85%{ transform:skewX(-2deg); }  100%{ transform:skewX(-2deg); } }
  .orb:hover .chip, .orb.revealed .chip{ transform:translate(var(--onx,0px),var(--ony,0px)) scale(var(--ogrow,1.04)); } /* over-state pos+scale from config.js (.revealed = tap-opened on touch) */
  /* FADE WHEN NOT OVER (fadeWhenNotOver in config.js): every character rests faded; the hovered / tapped one lights up */
  .orb{ opacity:var(--dim-op,.28); }
  .orb:hover, .orb.revealed, .orb.chosen{ opacity:1; }
  .orb.dim{ opacity:var(--dim-op,.28); }   /* the other two while one is active (same resting value) */
  /* each character is a sprite-sheet strip stepped frame-by-frame; all sit on their feet (bottom of the frame).
     the element IS one native frame (32×64 or 32×32) → --scale magnifies the true pixels (integer = crisp) */
  .sprite{ flex:none; transform:scale(calc(var(--rs,1) * var(--scale,1))); transform-origin:bottom center;
    background-repeat:no-repeat; image-rendering:pixelated; image-rendering:crisp-edges; -webkit-user-drag:none; }
  .sprite.gi{ width:32px; height:64px; background-image:url(assets/GIANT-sheet.png); background-size:320px 64px; animation:spr-gi var(--gi-dur,.88s) steps(10) infinite; }   /* 10 frames · speed = GIANT.fps in config.js */
  .sprite.wb{ width:32px; height:64px; background-image:url(assets/WALKBOY-sheet.png); background-size:auto; }   /* natural 1:1 · JS splits into 32×64 frames, count from sheet width */
  .sprite.lm{ width:32px; height:32px; background-image:url(assets/LITTLEMF-sheet.png); background-size:auto; }  /* natural 1:1 · JS splits into 32-wide frames, count from sheet width */
  @keyframes spr-gi{ from{ background-position-x:0 } to{ background-position-x:-320px } }
  .orb:hover .sprite.gi, .orb.revealed .sprite.gi{ animation-duration:var(--gi-odur,.88s); }   /* GIANT.over.fps in config.js */
  @keyframes spr-wb{ from{ background-position-x:0 } to{ background-position-x:-320px } }
  @keyframes spr-lm{ from{ background-position-x:0 } to{ background-position-x:-352px } }
  /* ---- the soil the three characters stand on ---- */
  #soil{ position:fixed; left:50%; transform:translateX(-50%); width:min(760px,88vw); height:2px; z-index:4; pointer-events:none;
    background:linear-gradient(90deg, transparent, #1a1622 14%, #1a1622 86%, transparent);
    opacity:0; transition:opacity 1s ease .4s; }
  #soil.in{ opacity:.9; }
  #soil::after{ content:""; position:absolute; left:8%; right:8%; top:2px; height:22px;
    background:radial-gradient(60% 100% at 50% 0, rgba(20,16,24,.14), transparent 70%); }

  /* ==== atmosphere (hover-triggered) ==== */
  /* GIANT hover → the cloud bank blows IN FROM THE RIGHT (coherent with the GIANT's wind, GIANT now on the
     right), on the soil line; it DECELERATES as it arrives and keeps slowly sliding left — no back-and-forth.
     The darker FRONT cloud drifts a little faster/further than the back one (parallax). Position set by layout(). */
  #clouds{ position:fixed; height:0; z-index:2; pointer-events:none; transform:translateX(-50%);
    opacity:0; transition:opacity .3s ease; }
  #clouds img{ position:absolute; bottom:0; left:50%; width:100%; height:auto; image-rendering:pixelated;
    transform:translate3d(-50%,0,0); will-change:transform; backface-visibility:hidden; }   /* translate3d, not translateX — forces its own GPU layer with sub-pixel-smooth compositing (fixes juddery motion at very slow speeds) */
  #clouds .back{  opacity:.9; }
  #clouds .front{ z-index:2; }                                    /* darker cloud in FRONT */
  /* reflection: a vertically-mirrored, faded copy hanging BELOW the soil line; its imgs share the drift animation */
  .cloudref{ position:absolute; left:0; right:0; top:0; height:0; transform:scaleY(-1); transform-origin:top center;
    opacity:.176; filter:brightness(.9); pointer-events:none; }                 /* lake reflection ~10% darker (Oli 2026-07-12) */
  .cloudref img{ -webkit-mask-image:linear-gradient(to top, #000 16%, transparent 84%);
    mask-image:linear-gradient(to top, #000 16%, transparent 84%); }
  body.clouds-in #clouds{ opacity:1; }
  /* blow in from the right at the SAME entrance pace, then once it has crossed the GIANT go SLOW-MOTION and hold that
     constant slow drift left (no settle, no sway). FRONT (darker) cloud runs just 2% quicker → edges ahead (parallax). */
  body.clouds-in #clouds .back{  animation:cloud-blow var(--cloud-back-dur,58s) linear forwards; }
  body.clouds-in #clouds .front{ animation:cloud-blow var(--cloud-front-dur,56.9s) linear forwards; }   /* front (darker) runs faster — parallax; ratio + all numbers below come from config.js */
  /* fallback keyframes (used only until the JS below generates the real ones from config.js — same shape, same defaults) */
  @keyframes cloud-blow{
    0%{   transform:translate3d(calc(-50% + 150px),0,0); animation-timing-function:cubic-bezier(.12,.7,.7,.888); }  /* fast entrance, exit slope MATCHES the linear cruise → no stop at the junction */
    12%{  transform:translate3d(calc(-50% + 0px),0,0);   animation-timing-function:linear; }                        /* crossed the GIANT → slow-motion, constant */
    100%{ transform:translate3d(calc(-50% - 120px),0,0); } }

  /* ---- the moon DROPS FROM THE SKY when the WalkBoy is HOVERED (body.moon-in): it falls past the logo (which
     occludes it, z3<z5) and lands at --moon-land (= the mid spot, set by layout), bouncing with real physics.
     #moonPeek's top/height are set by layout to span from the top of the screen down past the landing spot. */
  #moonPeek{ position:fixed; z-index:3; width:96px; margin-left:-48px;
    overflow:hidden; pointer-events:none; }
  #moonPeek img{ display:block; width:96px; height:96px; image-rendering:pixelated;
    transform:translateY(-450px); transition:transform .5s ease; }   /* rests up in the sky (off-screen); off-hover it flies back up */
  /* the moon is driven by a JS GRAVITY sim (below) — random-height bounces can't be a fixed keyframe.
     Base transform above = its resting spot up in the sky; the sim takes over on WalkBoy hover. */

  /* littleMF hover → a big AH! van DROPS in from the top, lands BEHIND littleMF with a bounce, + reflection */
  #car{ position:fixed; height:0; z-index:2; pointer-events:none; opacity:0; transition:opacity .3s ease; }
  #car img.body{ position:absolute; bottom:0; left:50%; width:100%; height:auto; image-rendering:pixelated;
    transform:translateX(calc(-50% + var(--car-start,-800px))); transition:transform .4s ease; will-change:transform; }   /* rests off-screen LEFT */
  .carref{ position:absolute; left:0; right:0; top:0; height:0; transform:scaleY(-1); transform-origin:top center;
    opacity:.18; pointer-events:none; }                                     /* mirrored, faded copy hanging below the soil */
  .carref img.body{ -webkit-mask-image:linear-gradient(to top, #000 22%, transparent 84%);
    mask-image:linear-gradient(to top, #000 22%, transparent 84%); }
  body.car-in #car{ opacity:1; }
  body.car-in #car img.body{ animation:car-drive var(--car-dur,1.5s) cubic-bezier(.12,.6,.25,1) forwards; }   /* drives in from the LEFT, brakes to a stop — duration from config.js */
  @keyframes car-drive{
    from{ transform:translateX(calc(-50% + var(--car-start,-800px))); }   /* off-screen left */
    to{   transform:translateX(-50%); }                                   /* rest behind littleMF (unchanged spot) */
  }

  /* WalkBoy hover → a little blue slime pops up next to him on the soil and idly squishes */
  /* TEMPORARILY HIDDEN — delete the `display:none;` below to bring the slime back. Everything else
     (markup, animation loop, positioning in the layout code) is left intact and still running. */
  #slime{ display:none;
    position:fixed; height:0; z-index:5; pointer-events:none; opacity:0; transform:translateY(8px);
    transition:opacity .3s ease, transform .3s cubic-bezier(.2,.8,.3,1.2); }
  #slime .slimesprite{ position:absolute; bottom:0; left:0; margin-left:-8px; width:16px; height:16px;
    background:url(assets/slime_blue.png) no-repeat 0 0; background-size:80px 32px; image-rendering:pixelated;
    transform-origin:bottom center; transform:scale(var(--sl-scale,3)); }    /* one 16×16 frame — JS steps background-position through the 7-frame loop */
  .slimeref{ position:absolute; left:0; right:0; top:0; height:0; transform:scaleY(-1); transform-origin:top center;
    opacity:.3; pointer-events:none; }                                        /* mirror below the soil, like the characters' lake */
  .slimeref .slimesprite{ -webkit-mask-image:linear-gradient(to top, #000 20%, transparent 85%);
    mask-image:linear-gradient(to top, #000 20%, transparent 85%); }
  body.moon-in #slime{ opacity:1; transform:translateY(0); }

  /* hover BACKDROPS — each character gets a soft CHANNEL of their own world rising behind them:
     GIANT → the red moon (back-moon.jpeg), WalkBoy → the teal sky/sun (back-sun.jpeg). A radial mask
     fades every edge so the image only exists around the character; inside, it drifts slowly upward
     and back — a little breathing world. z1 = behind everything (chars z6, lights/moon z3, van z2). */
  .backdrop{ position:fixed; z-index:1; pointer-events:none; opacity:0; transition:opacity .9s ease; }
  .backdrop .bd,.backdrop .bdref{ position:absolute; left:0; right:0; background-size:cover; background-position:50% 62%; }
  .backdrop .bd{ animation:backdrift 20s ease-in-out infinite; }
  /* lake reflection: mirrored copy below the soil, strongest at the shoreline, fading down (like the characters') */
  .backdrop .bdref{ transform:scaleY(-1); background-position:50% 100%; opacity:.22; filter:brightness(.92);
    -webkit-mask-image:linear-gradient(to bottom, transparent 0, #000 60%);
            mask-image:linear-gradient(to bottom, transparent 0, #000 60%); }
  /* WalkBoy = a CORRIDOR: full colour through the centre, just a LITTLE fade on each side */
  #backSun{ -webkit-mask-image:linear-gradient(to right, transparent 0, #000 14%, #000 86%, transparent 100%);
                    mask-image:linear-gradient(to right, transparent 0, #000 14%, #000 86%, transparent 100%); }
  /* GIANT = open to the RIGHT edge: FULL colour from 25% → 100%, one clean fade on the leftmost quarter */
  #backMoon{ -webkit-mask-image:linear-gradient(to right, transparent 0, #000 25%, #000 100%);
                     mask-image:linear-gradient(to right, transparent 0, #000 25%, #000 100%); }
  /* littleMF = the mirror of the GIANT: open to the LEFT edge, full colour to 75%, one clean fade on the right quarter */
  #backMF{ -webkit-mask-image:linear-gradient(to right, #000 0, #000 75%, transparent 100%);
                   mask-image:linear-gradient(to right, #000 0, #000 75%, transparent 100%); }
  /* background-image intentionally NOT set here — these are hover-only atmosphere (back-mf.jpeg alone
     is ~1.1MB) and are lazy-loaded by JS on first hover/tap of the matching character instead, so none
     of the three cost anything on initial page load. See loadBackdrop() further down. */
  body.clouds-in #backMoon{ opacity:.92; }
  body.moon-in #backSun{ opacity:.92; }
  body.car-in #backMF{ opacity:.92; }
  @keyframes backdrift{ 0%,100%{ background-position:50% 62%; } 50%{ background-position:50% 46%; } }
  @media (prefers-reduced-motion:reduce){ .backdrop .bd{ animation:none; } }

  /* GIANT hover → two soft spot-lights BEHIND the GIANT, between him and the clouds (z3): blue at the chest, cream at
     the head. Unity Light2D spec approximated as radial glows — blue In2.5/Out4.5, cream In0.8/Out2.8, Intensity 2.8,
     Falloff .55. (On a white page a true additive light is invisible, so these read as soft coloured light-pools.) */
  #giantLights{ position:fixed; z-index:3; pointer-events:none; opacity:0; transition:opacity .5s ease; }
  body.clouds-in #giantLights{ opacity:1; }
  .glo{ position:absolute; left:0; border-radius:50%; transform:translate(-50%,-50%); }
  .glo.chest{ top:-104px; width:280px; height:280px; filter:blur(22px);                  /* blue · soft diffuse light (gradual falloff + blurred edge) */
    background:radial-gradient(circle, rgba(56,104,255,.5) 0%, rgba(56,104,255,.44) 18%, rgba(56,104,255,.32) 38%, rgba(56,104,255,.18) 58%, rgba(56,104,255,.08) 78%, rgba(56,104,255,0) 100%); }
  .glo.head{ top:-168px; width:170px; height:170px; filter:blur(15px);                   /* cream · soft diffuse light */
    background:radial-gradient(circle, rgba(255,226,158,.62) 0%, rgba(255,226,158,.54) 16%, rgba(255,226,158,.4) 36%, rgba(255,226,158,.22) 58%, rgba(255,226,158,.09) 78%, rgba(255,226,158,0) 100%); }
  /* pixel-RPG dialogue box — hidden until the cursor is on that character */
  /* pixel dialogue bubble — an EMPTY pre-rendered frame (framebubble1.png, 2 blink frames of 111×32);
     the two lines of text are LIVE DOM, typed on hover (line 1 letter-by-letter, line 2 opens on dwell). */
  .orb .think{ position:absolute; z-index:16; width:var(--bub-w,222px); height:var(--bub-h,64px);   /* size = bubble.scale in config.js (native 111×32 × scale); this z-index only orders the bubble WITHIN its orb — clearing #mfDock is handled by the .orb:hover rule below */
    background-repeat:no-repeat; background-size:200% 100%; background-position-x:0;
    image-rendering:pixelated; image-rendering:crisp-edges;
    opacity:0; pointer-events:none; transition:opacity .12s steps(2), transform .18s steps(3); }

  /* all dialogue boxes appear ABOVE their character (RPG text-over-head; no off-screen clipping) */
  .orb .think{ left:50%; bottom:calc(var(--scale) * var(--headPx) * var(--rs) * 1px + var(--bub-y,14px)); transform-origin:bottom center; transform:translateX(calc(-50% + var(--bub-x,0px))) translateY(8px) scale(.96); }
  #oMusic .think{ bottom:var(--mf-bub, 96px); }                    /* littleMF: lift the bubble ABOVE the dropped van (height set by layout) */
  #oBook .think{ --bub-y:22px; --bub-x:0px; }                      /* WalkBoy ONLY: y = gap above his head, x = left/right nudge (overrides config.js bubble.x/.y) */
  #oArchives .think{ --bub-y:64px; --bub-x:0px; }                  /* GIANT ONLY: same two knobs (his --headPx is 54, so the bubble already starts much higher) */
  .orb:hover .think, .orb.revealed .think{ opacity:1; transform:translateX(calc(-50% + var(--bub-x,0px))) translateY(0) scale(1); }
  /* .orb has z-index:6, which creates a stacking context — so .think's z-index is scoped INSIDE the orb and
     can never beat #mfDock (15) on its own. Lift the whole orb while its bubble is showing instead.
     Stays under .world (21) and .topnav (22); body.opening .orb.chosen (z-index:7) is more specific, so
     the open-a-world animation is unaffected. */
  #oBook:hover, #oBook.revealed{ z-index:17; }   /* WalkBoy ONLY — littleMF's bubble stays behind the player */

  /* ═══ CODE MODE — painted bubble swapped for matrix-style typed code ═══
     Driven by MATRIX_ORBS in the script (search "MATRIX_ORBS"). The .think bubble is only HIDDEN here,
     never removed — empty that object and the original artwork comes straight back. */
  .orb.codemode .think{ display:none; }
  .orb .codeline{ position:absolute; left:50%; transform:translateX(-50%); display:none;
    bottom:calc(var(--scale) * var(--headPx) * var(--rs) * 1px + var(--code-y,14px));
    --code-y:14px;                                                  /* POSITION — gap above his head    */
    --code-size:12px;                                               /* SIZE — text size                 */
    flex-direction:column; align-items:flex-start; gap:2px;
    font-family:ui-monospace,'SF Mono',Menlo,'Courier New',monospace; font-size:var(--code-size);
    line-height:1.5; letter-spacing:.5px; white-space:pre; text-align:left;   /* pre (not nowrap) so leading spaces indent */
    color:var(--ink);                                               /* COLOUR — black, matches the site's ink */
    text-shadow:0 0 6px rgba(255,255,255,.85), 0 0 14px rgba(255,255,255,.6);   /* white halo so it stays readable over the sun backdrop */
    pointer-events:none; z-index:16; }
  .orb.codemode .codeline{ display:flex; }
  .codeline .cl{ display:block; }
  .codeline .b{ font-weight:700; letter-spacing:1.5px; }             /* bold — whole line, or one segment of it */
  /* the LAST line is the call to action (Enter? / Collect? / Play?). The .codeline container is
     pointer-events:none, so this opts just that line back in — it goes bold on hover to read as clickable.
     The click itself bubbles to the <a class="orb">, so it does exactly what clicking the character does. */
  .codeline .act{ pointer-events:auto; cursor:pointer; }
  /* text-stroke, NOT font-weight/letter-spacing: those change the glyph metrics, so the line gets wider,
     the (centred) .codeline container grows with it, and every line ABOVE re-centres. Stroke thickens the
     glyphs with zero layout change, so only this line reacts. */
  .codeline .act:hover{ -webkit-text-stroke:.6px currentColor; text-stroke:.6px currentColor; }
  /* littleMF only: white type, no plate, lifted higher above his head.
     Halo is dark (not white like the others) — it's the only thing separating white text from white paper. */
  /* littleMF's hover/click area, extended UPWARD. The orb is only as tall as its 128px chip and his sprite
     sits at the bottom of it, so moving the mouse toward "> Play?" left the orb and the lines vanished
     before you got there. This invisible pad closes that gap. Raise --mf-hit-h if the code moves higher. */
  #oMusic{ --mf-hit-h:190px; }
  #oMusic::before{ content:''; position:absolute; left:0; right:0; bottom:0; height:var(--mf-hit-h); z-index:0; }
  #oMusic .codeline{ color:#fff; --code-y:30px;
    text-shadow:0 0 4px rgba(0,0,0,.9), 0 0 10px rgba(0,0,0,.75), 0 0 20px rgba(0,0,0,.5); }
  #oMusic .codeline .cur{ background:#fff; box-shadow:0 0 6px rgba(0,0,0,.7); }
  /* an empty .codeline must not paint an empty plate when he isn't hovered */
  .orb.codemode .codeline:empty{ display:none; }
  .codeline .cur{ display:inline-block; width:.55em; height:1em; background:var(--ink); margin-left:2px;
    vertical-align:-2px; animation:codeblink 1s steps(1) infinite; }
  @keyframes codeblink{ 0%,49%{opacity:1} 50%,100%{opacity:0} }

  /* ---- thought-trail bubbles rising from his head to the world-orbs ---- */
  .tdot{ position:fixed; z-index:4; border-radius:50%; background:#fff; border:1.5px solid #111;
    box-shadow:0 3px 8px rgba(20,16,24,.16); pointer-events:none; opacity:0; transition:opacity .7s ease; }
  .tdot.in{ opacity:1; }

  /* ---- sparse comic messages (the artist's voice) ---- */
  .cap{ position:fixed; z-index:5; max-width:210px; background:#f3ead6; color:#171016; border:2px solid #111;
    padding:9px 12px; font-weight:700; font-style:italic; text-transform:uppercase; letter-spacing:.01em;
    line-height:1.28; font-size:12px; box-shadow:4px 4px 0 rgba(0,0,0,.26); pointer-events:none;
    opacity:0; transform:translateY(10px) rotate(var(--rot,-1.4deg)); transition:opacity .8s ease, transform .8s ease; }
  .cap em{ color:#a03828; font-style:italic; }
  .cap.in{ opacity:1; transform:translateY(0) rotate(var(--rot,-1.4deg)); }
  #cap1{ left:5vw;  top:24vh;    --rot:-1.7deg; }
  #cap2{ right:5vw; top:38vh;    --rot:1.5deg; text-align:right; }
  #cap3{ left:8vw;  bottom:15vh; --rot:-1.1deg; }
  @media (max-width:860px){ .cap{ display:none; } }        /* keep the phone view clean */

  /* ---- the world reveal (circle bloom out of the icon) ---- */
  #reveal{ position:fixed; inset:0; z-index:20; pointer-events:none;
    clip-path:circle(0% at var(--rx,50%) var(--ry,50%)); transition:clip-path .7s cubic-bezier(.7,0,.3,1); }
  body.opening #reveal{ clip-path:circle(150% at var(--rx,50%) var(--ry,50%)); pointer-events:auto; }

  /* ---- ALL THREE characters (GIANT → AH!rchives, WalkBoy → PHENOMENAH, littleMF → BEAH!TS): a two-stage
     transition instead of the circle-bloom.
     STAGE 1 (fast, ~0.5s): the logo + floor line + footer quietly disappear — clears the ambient UI first.
     STAGE 2 (5s): a TELEPORT — whichever character was picked stays roughly in place while a tunnel of
     light rings pulses outward around them and VHS scan-lines flicker with increasing intensity, building
     to a bright flash that vanishes them — no downward travel, no sliding off-screen. Targets .orb.chosen
     generically, so the same effect works for any character without any character-specific CSS. ---- */
  body.sink-music #top, body.sink-music #soil, body.sink-music #foot{
    opacity:0; transition:opacity .5s ease; }
  /* No `transform` in these keyframes ON PURPOSE: an animated property overrides the element's own value,
     so declaring scale(1) here would snap the chip back down out of its hover size the instant the
     teleport begins. Leaving it out lets the hover/opening transform hold for the whole vanish. */
  @keyframes teleport-char{
    0%{   filter:brightness(1) saturate(1); opacity:1; }
    70%{  filter:brightness(1.1) saturate(1); opacity:1; }
    88%{  filter:brightness(1.7) saturate(1.4); opacity:1; }
    94%{  filter:brightness(3) saturate(.3); opacity:.7; }
    100%{ filter:brightness(5) saturate(0); opacity:0; }
  }
  @keyframes tunnel-ring{
    0%{   transform:translate(-50%,-50%) scale(.25); opacity:0; border-width:2px; }
    10%{  opacity:.5; }
    65%{  opacity:.12; }
    100%{ transform:translate(-50%,-50%) scale(3.4); opacity:0; border-width:.5px; }
  }
  @keyframes vhs-flicker{
    0%,100%{ opacity:0; }
    15%{ opacity:.3; }  16%{ opacity:0; }
    32%{ opacity:.3; }  33%{ opacity:0; }
    50%{ opacity:.35; } 51%{ opacity:0; }
    65%{ opacity:.4; }  66%{ opacity:0; }
    78%{ opacity:.5; }  79%{ opacity:0; }
    86%{ opacity:.65; } 87%{ opacity:0; }
    91%{ opacity:.8; }  92%{ opacity:0; }
    95%{ opacity:1; }   96%{ opacity:0; }
  }
  body.vacuum .orb.chosen .chip{ animation:teleport-char 3s cubic-bezier(.4,0,.7,1) forwards !important; }   /* !important: overrides the hover-state chip transform still active mid-click */
  body.vacuum .orb.chosen .chip::before{ content:''; position:absolute; left:50%; top:50%; width:140px; height:140px;
    border-radius:50%; border:2px solid rgba(124,199,255,.7); pointer-events:none; z-index:1;
    animation:tunnel-ring 1.05s ease-out infinite; }
  body.vacuum .orb.chosen .chip::after{ content:''; position:absolute; inset:-16px -30px; pointer-events:none; z-index:2;
    background:repeating-linear-gradient(0deg, rgba(124,199,255,0) 0 3px, rgba(124,199,255,.4) 3px 4px, rgba(124,199,255,0) 4px 7px);
    mix-blend-mode:screen; animation:vhs-flicker 3s steps(1) forwards; }
  body.sink-music #reveal{ display:none; }

  /* ---- littleMF variant: skip stage 1 + the tunnel-ring circles entirely, go straight into a LONGER
     glitch — real chromatic aberration traced along his own silhouette (drop-shadow follows the sprite's
     alpha channel = his actual outline, not an overlay), with jittery position shifts, building to the
     same brightness-flash vanish. No scan-line bars anymore — it's entirely ON the character. ---- */
  @keyframes teleport-char-mf{
    0%{   filter:none; opacity:1; }
    6%{   filter:drop-shadow(2px 0 0 rgba(255,20,60,.55)) drop-shadow(-2px 0 0 rgba(20,255,220,.55)); opacity:1; }
    7%{   filter:none; opacity:1; }
    18%{  filter:drop-shadow(1px 0 0 rgba(255,20,60,.4)) drop-shadow(-1px 0 0 rgba(20,255,220,.4)); opacity:1; }
    19%{  filter:none; opacity:1; }
    32%{  filter:drop-shadow(3px 0 0 rgba(255,20,60,.6)) drop-shadow(-3px 0 0 rgba(20,255,220,.6)) drop-shadow(0 -2px 0 rgba(255,220,40,.4)); opacity:1; }
    33%{  filter:none; opacity:1; }
    46%{  filter:drop-shadow(2px 0 0 rgba(255,20,60,.5)) drop-shadow(-2px 0 0 rgba(20,255,220,.5)); opacity:1; }
    47%{  filter:none; opacity:1; }
    58%{  filter:drop-shadow(4px 0 0 rgba(255,20,60,.65)) drop-shadow(-4px 0 0 rgba(20,255,220,.65)) drop-shadow(0 2px 0 rgba(255,220,40,.45)); opacity:1; }
    59%{  filter:none; opacity:1; }
    70%{  filter:drop-shadow(3px 0 0 rgba(255,20,60,.6)) drop-shadow(-3px 0 0 rgba(20,255,220,.6)); opacity:1; }
    71%{  filter:none; opacity:1; }
    80%{  filter:drop-shadow(5px 0 0 rgba(255,20,60,.75)) drop-shadow(-5px 0 0 rgba(20,255,220,.75)) drop-shadow(0 -2px 0 rgba(255,220,40,.5)); opacity:1; }
    88%{  filter:drop-shadow(7px 0 0 rgba(255,20,60,.85)) drop-shadow(-7px 0 0 rgba(20,255,220,.85)) brightness(1.8) saturate(1.4); opacity:1; }
    93%{  filter:drop-shadow(9px 0 0 rgba(255,20,60,.9)) drop-shadow(-9px 0 0 rgba(20,255,220,.9)) brightness(3) saturate(.4); opacity:.7; }
    100%{ filter:brightness(5) saturate(0); opacity:0; }
  }
  body.vacuum-mf .orb.chosen .chip{ animation:teleport-char-mf 4.5s steps(1) forwards !important; }

  /* ---- MOON landing glitch: the same chromatic-aberration language as the character teleport, but it
     DECAYS back to clean instead of flashing out — the moon has to survive the impact. Fires when it
     touches down on floor2 (the lower position). Only `filter` is animated, so it never fights the
     gravity sim, which owns `transform` on this img every frame. ---- */
  @keyframes moon-glitch{
    0%{     filter:none; }
    8.45%{  filter:drop-shadow(2px 0 0 rgba(255,20,60,.55)) drop-shadow(-2px 0 0 rgba(20,255,220,.55)); }
    9.86%{  filter:none; }
    25.35%{ filter:drop-shadow(1px 0 0 rgba(255,20,60,.4)) drop-shadow(-1px 0 0 rgba(20,255,220,.4)); }
    26.76%{ filter:none; }
    45.07%{ filter:drop-shadow(3px 0 0 rgba(255,20,60,.6)) drop-shadow(-3px 0 0 rgba(20,255,220,.6)) drop-shadow(0 -2px 0 rgba(255,220,40,.4)); }
    46.48%{ filter:none; }
    64.79%{ filter:drop-shadow(2px 0 0 rgba(255,20,60,.5)) drop-shadow(-2px 0 0 rgba(20,255,220,.5)); }
    66.20%{ filter:none; }
    81.70%{ filter:drop-shadow(4px 0 0 rgba(255,20,60,.65)) drop-shadow(-4px 0 0 rgba(20,255,220,.65)) drop-shadow(0 2px 0 rgba(255,220,40,.45)); }
    83.10%{ filter:none; }
    98.60%{ filter:drop-shadow(3px 0 0 rgba(255,20,60,.6)) drop-shadow(-3px 0 0 rgba(20,255,220,.6)); }
    100%{   filter:none; }
  }
  /* infinite: the glitch runs for the WHOLE floor2 stay. The keyframes start and end on filter:none,
     so the loop is seamless. Duration = one full glitch cycle. */
  #moonPeek.glitch img{ animation:moon-glitch var(--moon-glitch-ms,2s) steps(1) infinite; }

  /* WARM TINT — eases in when it settles on floor2 and holds there, eases back out when it climbs to
     floor1. Lives on the CONTAINER, so it composes with the img's own aberration filter. */
  #moonPeek{ transition:filter .9s ease; }
  /* sepia lays down an amber base, saturate deepens it, hue-rotate swings that amber toward YELLOW
     (positive = away from red). Raise hue-rotate for greener-yellow, lower it for orange. */
  #moonPeek.warm{ filter:sepia(.85) saturate(2.4) hue-rotate(10deg) brightness(1.14); }


  /* BEAH!TS player dock — floats directly above littleMF's head (position set dynamically in layout()/JS,
     matching how the other atmosphere elements track his position). Toggled by clicking him — that's also
     how it closes, so no separate close button is needed. Doesn't hide anything else — GIANT/WalkBoy stay

  #mfDock{ position:fixed; z-index:15; display:none; transform:translate(-50%,-100%); }

  .world{ position:fixed; inset:0; z-index:21; overflow-y:auto; overflow-x:hidden; opacity:0; pointer-events:none;
    transition:opacity .5s ease; -webkit-overflow-scrolling:touch; }

  /* belt-and-suspenders: some elements inside a world set their OWN pointer-events override (e.g. .mfp-tbtn
     needs pointer-events:all to be clickable at all, since its parent #transport is pointer-events:none by
     design). Those per-element overrides win over the parent's none — which means a CLOSED world's buttons
     can stay genuinely clickable, sitting invisibly at a fixed screen position. This rule kills that dead:
     nothing inside a non-.show world can receive clicks, full stop, no matter what any child sets. */
  .world:not(.show) *{ pointer-events:none !important; }

  .world .back:hover{ opacity:1; }

  /* archives = deep space (dark) */
  #wArchives, #reveal.toArchives{ background:#05060a; }
  #wArchives{ color:#eef2ff; }
  #wArchives .btn{ color:#7cc7ff; } #wArchives .btn:hover{ background:#7cc7ff; color:#04122a; }
  #wArchives .starmini{ position:fixed; inset:0; z-index:-1; opacity:.5;
    background:radial-gradient(1.5px 1.5px at 20% 30%,#cfe3ff,transparent),radial-gradient(1.5px 1.5px at 70% 60%,#bcd,transparent),
    radial-gradient(1px 1px at 40% 80%,#fff,transparent),radial-gradient(1px 1px at 85% 20%,#dfe,transparent),
    radial-gradient(1.5px 1.5px at 55% 15%,#cde,transparent); background-repeat:no-repeat; }
  /* ============================================================
     archives descent — a PAGED stack of the built pages.
     Each page snaps to full-screen and becomes LIVE (interactive);
     moving between pages plays an envelope unfold + a VHS
     colour-line glitch segue. No scroll cross-fade.
     ============================================================ */
  #wArchives{ overflow:hidden; }                                  /* paged, not scrolled */
  #arcLayers{ position:fixed; inset:0; z-index:0; perspective:1700px; }
  #arcLayers .layer{ position:fixed; inset:0; opacity:0; pointer-events:none; visibility:hidden;
    transform-origin:top center; backface-visibility:hidden; will-change:opacity,transform,clip-path; }
  #arcLayers .layer iframe{ width:100%; height:100%; border:0; display:block; background:#05060a; pointer-events:none; }
  #arcLayers .layer.active{ opacity:1; visibility:visible; pointer-events:auto; z-index:2; }
  #arcLayers .layer.active iframe{ pointer-events:auto; }         /* the focused page is fully interactive */
  /* incoming page just appears once the black fade has covered the swap — no flip/unfold anymore */
  #arcLayers .layer.active{ opacity:1; }
  /* ---- per-layer LOADING card: covers the blank dark iframe until it fires `load`. Sits inside the
     layer, so it inherits the layer's visibility — a preloaded background layer never shows one. ---- */
  #arcLayers .arcload{ position:absolute; inset:0; z-index:3; display:flex; align-items:center; justify-content:center;
    background:#05060a; color:#7cc7ff; font-family:var(--mono); font-size:12px; letter-spacing:1.5px;
    transition:opacity .45s ease; }
  #arcLayers .arcload.gone{ opacity:0; pointer-events:none; }
  #arcLayers .arcload .cur{ display:inline-block; width:.55em; height:1em; background:#7cc7ff;
    margin-left:4px; vertical-align:-2px; animation:codeblink 1s steps(1) infinite; }
  /* ---- fade-to-black-and-back segue (covers the page swap) ---- */
  #arcFade{ position:fixed; inset:0; z-index:6; pointer-events:none; opacity:0; background:#000; }
  #arcFade.play{ animation:arcFadeBlack .7s ease both; }
  @keyframes arcFadeBlack{ 0%{opacity:0} 45%{opacity:1} 55%{opacity:1} 100%{opacity:0} }

  /* ---- page nav (dots + chevrons) — kept above the live page ---- */
  #arcNav{ position:fixed; right:20px; top:50%; transform:translateY(-50%); z-index:8; display:flex; flex-direction:column;
    gap:14px; }
  #arcNav .dot{ width:12px; height:12px; border-radius:50%; border:2px solid #7cc7ff; background:transparent; cursor:pointer;
    padding:0; opacity:.55; transition:opacity .2s, transform .2s, background .2s; }
  #arcNav .dot:hover{ opacity:1; transform:scale(1.15); }
  #arcNav .dot.on{ background:#7cc7ff; opacity:1; box-shadow:0 0 12px rgba(124,199,255,.8); }
  .arc-chev{ position:fixed; left:50%; transform:translateX(-50%); z-index:8; width:44px; height:44px; border-radius:50%;
    border:2px solid rgba(124,199,255,.6); background:rgba(5,6,12,.55); color:#cfe3ff; font-size:15px; cursor:pointer;
    -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); transition:opacity .25s, background .15s; opacity:.8; }
  .arc-chev:hover{ background:rgba(124,199,255,.22); opacity:1; }
  .arc-chev.up{ top:16px; } .arc-chev.down{ bottom:16px; animation:bob 1.8s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{ transform:translateX(-50%) translateY(0) } 50%{ transform:translateX(-50%) translateY(5px) } }
  #arcLabel{ position:fixed; left:50%; bottom:70px; transform:translateX(-50%); z-index:8; pointer-events:none;
    font-size:11px; letter-spacing:.24em; text-transform:uppercase; color:#9fb4d6; text-shadow:0 1px 12px rgba(0,0,0,.8);
    opacity:0; transition:opacity .4s ease; }

  /* book = warm paper */
  #wBook, #reveal.toBook{ background:#f3ead6; }
  #wBook{ color:#2a2016; } #wBook .card{ border-color:rgba(42,32,22,.18); background:rgba(255,255,255,.4); }
  #wBook .wrap{ position:relative; }   /* plain positioning context now — .hub-row/.hub-launch/.hub-brand are all independently absolute, so none can push another around */
  /* PHENOMENAH hub — a terminal launcher for BOOKmaker/Sprite Studio, plus a gallery of real book pages

  /* littleMF soundtrack player (BEAH!TS) — faithful port of TAH!PES's actual app.html UI: the real cassette

     config.js → moon.descentGravity1/2/3 (sky→floor1) · moon.firstMoveSpeed / firstCycleSpeed /
     floatSpeed / floatHeight / bounceCount (FLOOR 1's rhythm) · moon.toFloor2Speed1/2/3 (the hop DOWN,
     constant speed per stage) · moon.floor2MoveSpeed/Height, floor2CycleSpeed/Height, floor2FloatSpeed/Height,
     floor2BounceCount (FLOOR 2's own independent rhythm) · moon.ascentSpeed1/2/3 (the RISE back up to floor1). ---- */
  (function(){
    var mp=document.getElementById('moonPeek'), img=mp && mp.querySelector('img'); if(!img) return;
    var MP=P.moon||{}, mnum=function(v,d){ return (typeof v==='number'&&isFinite(v))?v:d; };
    var G1=mnum(MP.descentGravity1,700);
    var G2=mnum(MP.descentGravity2,G1);
    var G3=mnum(MP.descentGravity3,G2);
    var GW1=mnum(MP.descentStage1,0.25), GW2=mnum(MP.descentStage2,0.50), GW3=mnum(MP.descentStage3,0.25);   // WIDTH (share) of each of the 3 stages — they don't need to sum to 1, normalized automatically
    var GWSUM=(GW1+GW2+GW3)||1, G_SPLIT1=GW1/GWSUM, G_SPLIT2=(GW1+GW2)/GWSUM;
    // FLOOR 1 (behind the logo) — first stop, keeps ONE shared height across all its swings
    var F1_MOVE_S=mnum(MP.firstMoveSpeed,1), F1_CYCLE_S=mnum(MP.firstCycleSpeed,F1_MOVE_S);
    var F1_FLOAT_S=mnum(MP.floatSpeed,1), F1_H=mnum(MP.floatHeight,6);
    var F1_BOUNCES=Math.max(1,mnum(MP.bounceCount,4));
    // hop DOWN to floor2 — constant speed per stage, same mechanics as the ascent (NOT accelerating gravity)
    var TF2_S1=mnum(MP.toFloor2Speed1,250);
    var TF2_S2=mnum(MP.toFloor2Speed2,TF2_S1);
    var TF2_S3=mnum(MP.toFloor2Speed3,TF2_S2);
    var TF2_BREAK1=mnum(MP.toFloor2Break1,15), TF2_BREAK2=mnum(MP.toFloor2Break2,30);   // FIXED px into the hop where it switches speed1→speed2→speed3
    // FLOOR 2 (second position) — fully independent speeds AND heights per swing
    var F2_MOVE_S=mnum(MP.floor2MoveSpeed,F1_MOVE_S),   F2_MOVE_H=mnum(MP.floor2MoveHeight,F1_H);
    var F2_CYCLE_S=mnum(MP.floor2CycleSpeed,F1_CYCLE_S), F2_CYCLE_H=mnum(MP.floor2CycleHeight,F1_H);
    var F2_FLOAT_S=mnum(MP.floor2FloatSpeed,F1_FLOAT_S), F2_FLOAT_H=mnum(MP.floor2FloatHeight,F1_H);
    var F2_BOUNCES=Math.max(1,mnum(MP.floor2BounceCount,F1_BOUNCES));
    // RISE back up to floor1 — also constant speed per stage, staged by FIXED px into the rise
    var AS1=mnum(MP.ascentSpeed1,120), AS2=mnum(MP.ascentSpeed2,AS1), AS3=mnum(MP.ascentSpeed3,AS2);
    var AS_BREAK1=mnum(MP.ascentBreak1,15), AS_BREAK2=mnum(MP.ascentBreak2,30);   // FIXED px into the rise where it switches speed1→speed2→speed3

    var y=0, v=0, running=false, phase='fall', last=0, raf=0, floorKey='floor1', cycles=0, ph=0, stage='v1', halfN=0, skyY=0, travelDir='down', hopY=0;
    function num(k,d){ var n=parseFloat(mp.dataset[k]); return isFinite(n)?n:d; }
    /* The moon lands on floor2 once per cycle, so the class has to be removed and re-added to replay the
       animation — reading offsetWidth in between forces the reflow that makes the restart take. */
    /* Both classes go on when it touches down on floor2 and stay until it climbs back to floor1 —
       the glitch loops and the yellow tint holds for the whole time it's at the lower position. */
    function moonGlitch(){
      if(reduced) return;
      mp.classList.remove('glitch'); void mp.offsetWidth;                  // reflow → restart the loop cleanly on re-entry
      mp.classList.add('glitch'); mp.classList.add('warm');
    }
    function profile(){
      return floorKey==='floor1'
        ? {moveS:F1_MOVE_S, moveH:F1_H, cycleS:F1_CYCLE_S, cycleH:F1_H, floatS:F1_FLOAT_S, floatH:F1_H, bounces:F1_BOUNCES}
        : {moveS:F2_MOVE_S, moveH:F2_MOVE_H, cycleS:F2_CYCLE_S, cycleH:F2_CYCLE_H, floatS:F2_FLOAT_S, floatH:F2_FLOAT_H, bounces:F2_BOUNCES};
    }
    function frame(t){
      if(!running) return;
      if(!last){ last=t; raf=requestAnimationFrame(frame); return; }
      var dt=Math.min((t-last)/1000, 0.05); last=t;
      var floor=num(floorKey,0);
      if(phase==='fall'){                                                     // ── initial DESCENT from the sky — gravity steps down in 3 stages by % fallen ──
        var total=floor-skyY, prog=total!==0 ? Math.min(1,Math.max(0,(y-skyY)/total)) : 1;
        var g = prog<G_SPLIT1 ? G1 : prog<G_SPLIT2 ? G2 : G3;
        v += g*dt; y += v*dt;
        if(y>=floor){ y=floor; phase='float'; cycles=0; ph=0; stage='v1'; halfN=0; }
      } else if(phase==='float'){                                             // ── FLOAT: dips DOWN first, then bobs ── speeds/heights depend on WHICH floor ──
        var pr=profile();
        var curSpeed = stage==='v1' ? pr.moveS : stage==='v2' ? pr.cycleS : pr.floatS;
        var curH     = stage==='v1' ? pr.moveH : stage==='v2' ? pr.cycleH : pr.floatH;
        ph += curSpeed*2.0*dt;
        var amp=curH*Math.min(1, ph/(Math.PI/2));                             // ramps in fully by the BOTTOM of the first dip — tied to phase, not the clock, so it scales WITH speed
        y=floor + amp*Math.sin(ph);
        var hn=Math.floor(ph/Math.PI);                                       // counts HALF-periods (each down-up swing back to floor)
        if(hn>halfN){ halfN=hn; if(stage==='v1') stage='v2'; else if(stage==='v2') stage='normal'; }
        var n=Math.floor(ph/(2*Math.PI));                                    // counts FULL periods (against THIS floor's bounce count)
        if(n>cycles){ cycles=n;
          if(cycles>=pr.bounces){
            var goingDown=(floorKey==='floor1');
            floorKey=goingDown?'floor2':'floor1';
            travelDir=goingDown?'down':'up';
            if(!goingDown) mp.classList.remove('glitch','warm');           // leaving floor2 → glitch stops, tint eases off
            hopY=y; v=0; phase='travel';
          } }
      } else if(phase==='travel'){                                            // ── TRAVEL: DOWN to floor2 or UP back to floor1, both constant speed staged by FIXED px ──
        if(travelDir==='down'){
          var distH=y-hopY;
          var sH = distH<TF2_BREAK1 ? TF2_S1 : distH<TF2_BREAK2 ? TF2_S2 : TF2_S3;
          y += sH*dt;
          if(y>=floor){ y=floor; phase='float'; cycles=0; ph=0; stage='v1'; halfN=0; moonGlitch(); }   // touched down on FLOOR 2 → glitch
        } else {
          var distR=hopY-y;
          var aS = distR<AS_BREAK1 ? AS1 : distR<AS_BREAK2 ? AS2 : AS3;
          y -= aS*dt;
          if(y<=floor){ y=floor; phase='float'; cycles=0; ph=0; stage='v1'; halfN=0; }
        }
      }
      img.style.transform='translateY('+(y-48)+'px)';                         // img 96 tall → centre = y
      raf=requestAnimationFrame(frame);
    }
    function start(){ if(document.body.classList.contains('opening')) return;
      img.style.transition='none';                                            // the sim sets transform every frame
      if(reduced){ img.style.transform='translateY('+(num('floor1',0)-48)+'px)'; return; }   // static peek, no motion
      skyY=num('sky',-80); y=skyY; v=0; phase='fall'; floorKey='floor1'; cycles=0; ph=0; stage='v1'; halfN=0; last=0; running=true;
      cancelAnimationFrame(raf); raf=requestAnimationFrame(frame); }
    function stop(){ running=false; cancelAnimationFrame(raf); img.style.transition=''; img.style.transform='';
      mp.classList.remove('glitch','warm'); }   // → CSS base (flies back up to the sky), glitch + tint cleared
    var oBk=document.getElementById('oBook');
    if(oBk){ oBk.addEventListener('pointerenter', start); oBk.addEventListener('pointerleave', stop); }
  })();
})();
</script>

<script>
/* ---- littleMF soundtrack player (BEAH!TS) — faithful port of TAH!PES's real app.html + main.js.
       Tracks come from config.js → music.tracks instead of native file dialogs (no local file access on
       the web); everything else — visualizer, OG/MF sprites, marquee, transport, seek, A/B playlist —
       is the same portable web tech the original app already used. ---- */
(function(){
  var P=window.AH_PARAMS||{}, tracks=(P.music&&P.music.tracks)||[];
  var audio=document.getElementById('mfAudio'); if(!audio) return;
  var cur=-1, isPlaying=false;
  /* read-only view of the player for code OUTSIDE this IIFE (littleMF's "now playing" line).
     Closes over the live vars, so it always reports the current state. */
  window.AH_PLAYER={ state:function(){ var t=tracks[cur]||null;
    return { playing:isPlaying, index:cur, total:tracks.length, title:(t&&t.title)||'' }; } };
  var sprites={og:false,mf:false};
  audio.volume=(P.music && typeof P.music.volume==='number') ? P.music.volume : 0.8;

  // ── visualizer: draws to BOTH the full player's canvas AND the mini-preview's canvas, from the same data ──
  var waveCanvas=document.getElementById('waveCanvas'), waveCtx=waveCanvas.getContext('2d');
  var W=260,H=50; waveCanvas.width=W; waveCanvas.height=H;
  var miniCanvas=document.getElementById('miniViz'), miniCtx=miniCanvas && miniCanvas.getContext('2d');
  var MW=190, MH=26; if(miniCanvas){ miniCanvas.width=MW; miniCanvas.height=MH; }
  var fakePhase=0, audioCtx, analyser, sourceNode, dataArray, vizReady=false;
  function initAudio(){
    if(audioCtx){ audioCtx.resume(); return; }                     // AudioContext needs a user gesture — called only from play actions
    try{
      audioCtx=new (window.AudioContext||window.webkitAudioContext)();
      analyser=audioCtx.createAnalyser(); analyser.fftSize=256; analyser.smoothingTimeConstant=0.82;
      dataArray=new Uint8Array(analyser.frequencyBinCount);
      sourceNode=audioCtx.createMediaElementSource(audio);          // can only be created ONCE per <audio> element
      sourceNode.connect(analyser); analyser.connect(audioCtx.destination);
      vizReady=true;
    }catch(e){ vizReady=false; }
  }
  function bellCurve(i,total){ return Math.sin(Math.PI*i/(total-1)); }
  function paintWave(ctx,w,h,bars){
    ctx.clearRect(0,0,w,h);
    if(!isPlaying && !vizReady) return;
    var bw=w/bars;
    if(vizReady && analyser){
      var sig=false;
      for(var i=0;i<bars;i++){ var v=dataArray[Math.floor(i*dataArray.length/bars)]/255*bellCurve(i,bars);
        if(v<0.02) continue; sig=true;
        var bh=v*h; ctx.fillStyle='rgba('+Math.round(160+v*95)+','+Math.round(80+v*120)+',0,0.92)';
        ctx.fillRect(i*bw,h-bh,bw-1,bh); }
      if(!sig) ctx.clearRect(0,0,w,h);
    } else if(isPlaying){
      for(var i=0;i<bars;i++){ var v=(Math.abs(Math.sin(fakePhase+i*0.3))*0.5+Math.random()*0.18)*bellCurve(i,bars);
        if(v<0.03) continue;
        var bh=v*h; ctx.fillStyle='rgba('+Math.round(160+v*95)+','+Math.round(80+v*120)+',0,0.88)';
        ctx.fillRect(i*bw,h-bh,bw-1,bh); }
    }
  }
  function drawWave(){
    requestAnimationFrame(drawWave);
    if(vizReady && analyser) analyser.getByteFrequencyData(dataArray);   // read ONCE per frame, shared by both canvases
    if(isPlaying) fakePhase+=0.07;
    paintWave(waveCtx, W, H, 52);
    if(miniCtx) paintWave(miniCtx, MW, MH, 32);
  }
  drawWave();
  document.getElementById('waveZone').addEventListener('click', function(e){
    if(!audio.duration) return;
    var r=this.getBoundingClientRect();
    audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
  });

  // ── OG / MF toggleable pixel sprites (walking + idle animation strips) ──
  var ogCanvas=document.getElementById('spriteOg'); ogCanvas.width=32; ogCanvas.height=64;
  var ogCtx=ogCanvas.getContext('2d'); ogCtx.imageSmoothingEnabled=false;
  var ogImg=new Image(); ogImg.src='assets/OG.png';
  var mfCanvas=document.getElementById('spriteMf'); mfCanvas.width=32; mfCanvas.height=32;
  var mfCtx=mfCanvas.getContext('2d'); mfCtx.imageSmoothingEnabled=false;
  var mfImg=new Image(); mfImg.src='assets/MF_idle.png';
  var ogFrame=0, ogTimer=0, mfFrame=0, mfTimer=0, lastTs=0;
  function drawSprites(ts){
    requestAnimationFrame(drawSprites);
    var dt=Math.min(ts-lastTs,100); lastTs=ts;
    if(sprites.og && ogImg.complete && ogImg.naturalWidth>0){
      ogTimer+=dt; if(ogTimer>=1000/16){ ogFrame=(ogFrame+1)%10; ogTimer-=1000/16; }
      ogCtx.clearRect(0,0,32,64); ogCtx.drawImage(ogImg,ogFrame*32,0,32,64,0,0,32,64);
    }
    if(sprites.mf && mfImg.complete && mfImg.naturalWidth>0){
      mfTimer+=dt; if(mfTimer>=1000/17){ mfFrame=(mfFrame+1)%11; mfTimer-=1000/17; }
      mfCtx.clearRect(0,0,32,32); mfCtx.drawImage(mfImg,mfFrame*32,0,32,32,0,0,32,32);
    }
  }
  requestAnimationFrame(drawSprites);
  function toggleSprite(name){
    sprites[name]=!sprites[name];
    document.getElementById(name==='og'?'spriteOg':'spriteMf').classList.toggle('visible', sprites[name]);
    document.getElementById(name==='og'?'pillOg':'pillMf').classList.toggle('off', !sprites[name]);
    if(!sprites[name]){ if(name==='og') ogCtx.clearRect(0,0,32,64); else mfCtx.clearRect(0,0,32,32); }
  }
  document.getElementById('pillOg').onclick=function(){ toggleSprite('og'); };
  document.getElementById('pillMf').onclick=function(){ toggleSprite('mf'); };

  // ── seek bar ──
  var seekWrap=document.getElementById('seekBarWrap'), seekFill=document.getElementById('seekFill'), seekThumb=document.getElementById('seekThumb');
  function updateSeek(){ if(!audio.duration) return; var pct=(audio.currentTime/audio.duration)*100; seekFill.style.width=pct+'%'; seekThumb.style.left=pct+'%'; }
  seekWrap.addEventListener('click', function(e){ if(!audio.duration) return; var r=seekWrap.getBoundingClientRect(); audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration; });

  // ── marquee scrolling track name (full player) + plain title text (mini preview, no marquee needed at that size) ──
  var mTrack=document.getElementById('marqueeTrack'), WRAP_W=206, mPos=WRAP_W+20, mActive=false;
  function getTextW(){ var sw=mTrack.scrollWidth; return sw>10?sw:mTrack.textContent.length*12; }
  setTimeout(function(){ mPos=WRAP_W+20; mActive=true; }, 1000);
  setInterval(function(){ if(!mActive || !isPlaying) return; mPos-=0.6; if(mPos<-(getTextW()+20)) mPos=WRAP_W+20; mTrack.style.left=mPos+'px'; }, 16);
  function setTrackName(name){
    // reset position in the SAME tick as the text swap — deferring it (the old setTimeout 100ms) let the
    // new title paint at the PREVIOUS track's scroll offset for a few frames, flashing letters mid-bar
    mTrack.textContent=name; mPos=WRAP_W+20; mTrack.style.left=mPos+'px';
    var mt=document.getElementById('miniTitle'); if(mt) mt.textContent=name;
  }

  // ── transport / playback ──
  function nextWithSrc(from){ for(var i=0;i<tracks.length;i++){ var j=((from+i)%tracks.length+tracks.length)%tracks.length; if(tracks[j]&&tracks[j].src) return j; } return -1; }
  function prevWithSrc(from){ for(var i=0;i<tracks.length;i++){ var j=((from-i)%tracks.length+tracks.length)%tracks.length; if(tracks[j]&&tracks[j].src) return j; } return -1; }
  // outline transport icons — edit the path data here to reshape play/pause everywhere
  var ICON_PLAY  = '<svg viewBox="0 0 24 24"><path d="M8 5.5v13L18.5 12z"/></svg>';
  var ICON_PAUSE = '<svg viewBox="0 0 24 24"><path d="M9.5 5.5v13M14.5 5.5v13"/></svg>';
  function setPlayIcon(playing){                                       // updates BOTH the full transport button and the mini preview's
    var ic = playing ? ICON_PAUSE : ICON_PLAY;
    var a=document.getElementById('tbtnPlay'); if(a) a.innerHTML=ic;
    var b=document.getElementById('miniPlay'); if(b) b.innerHTML=ic;
  }
  function loadTrack(i){ var t=tracks[i]; if(!t||!t.src) return;
    cur=i; initAudio(); audio.src=t.src; audio.load();
    audio.play().then(function(){ isPlaying=true; setPlayIcon(true); }).catch(function(){});
    setTrackName((t.title||'Untitled').toUpperCase()); renderPlaylist(); }
  function togglePlay(){ if(cur<0){ var f=nextWithSrc(0); if(f>=0) loadTrack(f); return; }
    initAudio();
    if(isPlaying){ audio.pause(); isPlaying=false; setPlayIcon(false); }
    else{ audio.play(); isPlaying=true; setPlayIcon(true); } }
  function stopTrack(){ audio.pause(); audio.currentTime=0; isPlaying=false; setPlayIcon(false); seekFill.style.width='0%'; seekThumb.style.left='0%'; }
  function nextTrack(){ var n=nextWithSrc(cur+1); if(n>=0) loadTrack(n); }
  function prevTrack(){ if(audio.currentTime>3){ audio.currentTime=0; return; } var n=prevWithSrc(cur-1); if(n>=0) loadTrack(n); }

  document.getElementById('tbtnPlay').onclick=togglePlay;
  document.getElementById('tbtnStop').onclick=stopTrack;
  document.getElementById('tbtnNext').onclick=nextTrack;
  document.getElementById('tbtnPrev').onclick=prevTrack;

  // mini preview controls (above littleMF's head on the homepage) — stopPropagation so a click doesn't also
  // bubble up to the <a>#oMusic and trigger enter() into the full BEAH!TS world
  var miniPlayBtn=document.getElementById('miniPlay'), miniPrevBtn=document.getElementById('miniPrev'), miniNextBtn=document.getElementById('miniNext');
  if(miniPlayBtn) miniPlayBtn.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); togglePlay(); });
  if(miniPrevBtn) miniPrevBtn.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); prevTrack(); });
  if(miniNextBtn) miniNextBtn.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); nextTrack(); });

  audio.addEventListener('timeupdate', function(){
    var s=audio.currentTime;
    document.getElementById('timeDisplay').textContent=('0'+Math.floor(s/60)).slice(-2)+':'+('0'+Math.floor(s%60)).slice(-2);
    updateSeek();
  });
  audio.addEventListener('ended', nextTrack);
  audio.addEventListener('error', function(){ if(tracks[cur]) tracks[cur].src=''; setTrackName('— FILE NOT FOUND —'); renderPlaylist(); });

  // ── playlist — the stack of cassette spines (PLAYLIST.jpg), one clickable band per track ──
  /* Cassette boundaries in PLAYLIST.jpg (736×559), as top/bottom % of the image height — measured from the
     black gaps between spines. Band i maps to tracks[i]. If you re-art the image, only these numbers change.
     ODB · MANÈGE · GOODBYE · SLEEP & TEARS · FAREAST — same order as config.js music.tracks. */
  var PL_BANDS=[[0,19.68],[19.68,39.18],[39.18,59.03],[59.03,80.14],[80.14,100]];
  function renderPlaylist(){
    var host=document.getElementById('plCassettes'); if(!host) return;
    [].forEach.call(host.querySelectorAll('.plband'), function(b){ b.parentNode.removeChild(b); });   // clear old bands
    PL_BANDS.forEach(function(band,i){
      var t=tracks[i], live=!!(t&&t.src);
      var el=document.createElement('div');
      el.className='plband'+(i===cur?' on':'')+(live?'':' dead');
      el.style.top=band[0]+'%'; el.style.height=(band[1]-band[0])+'%';
      el.title=t?(t.title||'').toUpperCase():'';
      if(live) el.onclick=function(){ loadTrack(i); };
      host.appendChild(el);
    });
  }
  renderPlaylist();

  // ── PL panel toggle ──
  var plOpen=false;
  document.getElementById('pillPl').onclick=function(){        // PL pill is the only toggle now — no close button on the panel
    plOpen=!plOpen;
    document.getElementById('plPanel').classList.toggle('visible', plOpen);
    document.getElementById('pillPl').classList.toggle('off', !plOpen);
  };
})();
</script>
<script>
/* ---- PHENOMENAH hub (WalkBoy's world) — launcher + real page gallery. Paths mirror BOOKmaker's own
       on-disk structure: assets/thumbnails/PHE/<id>.jpg for the grid, assets/originals/PHE/<id>.jpg for
       the full-res reader. Page order + names come straight from BOOKmaker's manifest.json. ---- */
(function(){
  var wrap=document.getElementById('wBook'); if(!wrap) return;
  var PAGES=[                                                        // explicit thumb+full paths (not every page has a generated thumbnail)
    {thumb:'assets/originals/PHE/Main.png', full:'assets/originals/PHE/Main.png', name:'Cover'},
    {thumb:'assets/originals/PHE/PHE.png', full:'assets/originals/PHE/PHE.png', name:'PHE'},
    {thumb:'assets/thumbnails/PHE/d505f0f1ba53.jpg', full:'assets/originals/PHE/d505f0f1ba53.jpg', name:'untitled scene'},
    {thumb:'assets/thumbnails/PHE/e6e82b9ac33f.jpg', full:'assets/originals/PHE/e6e82b9ac33f.jpg', name:'untitled scene'},
    {thumb:'assets/thumbnails/PHE/a6152f04cd8b.jpg', full:'assets/originals/PHE/a6152f04cd8b.jpg', name:'untitled scene'},
    {thumb:'assets/thumbnails/PHE/b7fd4cbbe37c.jpg', full:'assets/originals/PHE/b7fd4cbbe37c.jpg', name:'untitled scene'},
  ];
  var grid=document.getElementById('hubPages');
  PAGES.forEach(function(p,i){
    var d=document.createElement('div'); d.className='hub-page';
    d.innerHTML='<img src="'+p.thumb+'" alt="" loading="lazy"><div class="n">'+('0'+(i+1)).slice(-2)+'</div>';
    d.onclick=function(){ openReader(i); };
    grid.appendChild(d);
  });

  var reader=document.getElementById('hubReader'), spreadEl=document.getElementById('hrSpread'),
      toggleBtn=document.getElementById('hrToggle');
  var curIdx=0, spreadMode=true;
  function alignedIdx(i){                                              // Cover (0) and PHE (1) are always solo; pairing starts at index 2: [2,3],[4,5]...
    if(i<2) return i;
    return i - ((i-2)%2);
  }
  function pageCard(i){
    var p=PAGES[i]; if(!p) return '';
    return '<div class="hr-page"><img src="'+p.full+'" alt=""><div class="cap"><b>'+('0'+(i+1)).slice(-2)+'</b>'+p.name+'</div></div>';
  }
  function renderSpread(){
    spreadEl.innerHTML = (!spreadMode || curIdx<2) ? pageCard(curIdx) : pageCard(curIdx)+pageCard(curIdx+1);
  }
  function openReader(i){
    curIdx = spreadMode ? alignedIdx(i) : i;
    renderSpread();
    reader.classList.add('show'); reader.setAttribute('aria-hidden','false');
  }
  function closeReader(){ reader.classList.remove('show'); reader.setAttribute('aria-hidden','true'); }
  function nextStop(cur, d){                                            // walks the solo→solo→pair→pair sequence correctly in both directions
    if(!spreadMode) return Math.max(0, Math.min(PAGES.length-1, cur+d));
    if(d>0){
      if(cur===0) return Math.min(PAGES.length-1, 1);
      if(cur===1) return Math.min(PAGES.length-1, 2);
      return Math.min(PAGES.length-1, cur+2);
    } else {
      if(cur<=1) return Math.max(0, cur-1);
      if(cur===2) return 1;
      return cur-2;
    }
  }
  function nav(d){ openReader(nextStop(curIdx, d)); }
  toggleBtn.onclick=function(){ spreadMode=!spreadMode; openReader(curIdx); };
  document.getElementById('hubReaderClose').onclick=closeReader;
  document.getElementById('hubPrev').onclick=function(){ nav(-1); };
  document.getElementById('hubNext').onclick=function(){ nav(1); };
  reader.addEventListener('click', function(e){ if(e.target===reader) closeReader(); });   // click the dark backdrop to close
  // capture phase + stopImmediatePropagation: runs BEFORE the world's own Escape-closes-everything handler,
  // so Escape/arrows close/navigate just the reader, not the whole PHENOMENAH world underneath it
  addEventListener('keydown', function(e){
    if(!reader.classList.contains('show')) return;
    if(e.key==='Escape'){ e.stopImmediatePropagation(); closeReader(); }
    else if(e.key==='ArrowLeft'){ e.stopImmediatePropagation(); nav(-1); }
    else if(e.key==='ArrowRight'){ e.stopImmediatePropagation(); nav(1); }
  }, true);

  // copy-to-clipboard for the launch command
  var copyBtn=document.getElementById('hubCopyBtn'), cmdEl=document.getElementById('hubCmd');
  if(copyBtn){ copyBtn.onclick=function(){
    var text=cmdEl.textContent;
    (navigator.clipboard ? navigator.clipboard.writeText(text) : Promise.reject())
      .then(function(){ copyBtn.textContent='copied ✓'; copyBtn.classList.add('copied');
        setTimeout(function(){ copyBtn.textContent='copy'; copyBtn.classList.remove('copied'); }, 1600); })
      .catch(function(){ copyBtn.textContent='select & ⌘C'; });
  }; }

  // pencil click — reveal/hide the launch command (matches BOOKmaker's own per-chapter pencil icon)
  var pencil=document.getElementById('hubPencil'), launch=document.getElementById('hubLaunch');
  if(pencil && launch){ pencil.onclick=function(){ launch.classList.toggle('open'); }; }
})();
</script>
</body>
</html>
